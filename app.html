<script>
/* ════════════════════════════════════════════════════════════════
   TURNI DEMO MVP · CAMADA 1
   Banco em localStorage · 14 personas · roteamento por hash
   ════════════════════════════════════════════════════════════════ */

const DB_KEY = 'turni-demo-mvp-v1';
const SESSION_KEY = 'turni-demo-mvp-session';
const THEME_KEY = 'turni-theme';

// ── THEME MANAGEMENT ──
// Light/dark com persistência por usuário, detecção de preferência do sistema
function initTheme(){
  let theme = localStorage.getItem(THEME_KEY);
  if(!theme){
    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  applyTheme(theme);
}
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem(THEME_KEY, theme);
  const icon = document.getElementById('themeIcon');
  if(icon){
    icon.setAttribute('data-lucide', theme === 'dark' ? 'sun' : 'moon');
    if(window.lucide) lucide.createIcons();
  }
}
function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(current === 'light' ? 'dark' : 'light');
}
initTheme();
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('themeToggle');
  if(btn) btn.addEventListener('click', toggleTheme);
});

// ── AVATAR HELPER ──
// Renderiza avatar com foto Pravatar quando disponível, fallback para inicial.
// Sprint B.2: imagens com lazy-loading, decoding async, fade-in suave em mobile inferior.
function avatarHTML(user){
  if(user?.foto){
    const ini = (user?.nome||'?').trim().charAt(0).toUpperCase();
    return `<img src="${escapeHtml(user.foto)}" alt="${escapeHtml(user.nome||'')}" class="lazy-img" loading="lazy" decoding="async" data-fallback="${escapeHtml(ini)}" onload="this.classList.add('loaded');this.parentElement?.classList.add('img-loaded')" onerror="lazyImgFail(this)">`;
  }
  return user?.avatar || '?';
}

// Handler de erro de imagem · troca por monogram + remove skeleton
function lazyImgFail(img){
  if(!img) return;
  const ini = img.getAttribute('data-fallback') || '?';
  const parent = img.parentElement;
  img.classList.add('failed');
  if(parent){
    parent.classList.add('img-loaded'); // remove skeleton mesmo no erro
    if(!parent.querySelector('.img-failed-fallback')){
      const span = document.createElement('span');
      span.className = 'img-failed-fallback';
      span.textContent = ini;
      parent.appendChild(span);
    }
  }
}

// ── BRAND PALETTE · paletas curadas por estabelecimento
// Cada paleta tem {bg, fg, accent} para gerar logos SVG elegantes e diferenciados
const BRAND_PALETTES = {
  'A Pizza da Mooca':       {bg:'#1A2E1F', fg:'#F4E5C2', accent:'#D9A441'},
  'Hospedaria':             {bg:'#7A4A1E', fg:'#F8E8C8', accent:'#C19660'},
  'Onessta':                {bg:'#3A1820', fg:'#E8C9A0', accent:'#A8625F'},
  'Brasa Prime Steakhouse': {bg:'#1F1815', fg:'#F4A04C', accent:'#D9A441'},
  'Hotel Vista Bela':       {bg:'#1A2E3F', fg:'#F0E8D8', accent:'#7BAACC'}
};

const _PALETTE_CYCLE = [
  {bg:'#2D3F2D', fg:'#F4E5C2', accent:'#7BC299'},
  {bg:'#3F2D1F', fg:'#F4D9A4', accent:'#D9A441'},
  {bg:'#2D1F2D', fg:'#E8C9D9', accent:'#A8628B'},
  {bg:'#1F2D3F', fg:'#D9E8F4', accent:'#7BAACC'},
  {bg:'#3F1F1F', fg:'#F4C9C9', accent:'#CC7B7B'}
];

// Hash simples · estável e determinístico
function _hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h = ((h<<5)-h) + s.charCodeAt(i); h|=0; } return Math.abs(h); }

function paletteFor(emp){
  const name = (emp?.estabelecimento || emp?.nome || '').replace(/·.*/, '').trim();
  // 1) match exato por nome canônico (curated)
  for(const k in BRAND_PALETTES){ if(name.indexOf(k) !== -1) return BRAND_PALETTES[k]; }
  // 2) fallback determinístico por hash do nome
  return _PALETTE_CYCLE[_hashStr(name) % _PALETTE_CYCLE.length];
}

function getInitials(emp){
  const text = (emp?.estabelecimento || emp?.nome || '?').replace(/·.*/, '').trim();
  // Remove preposições comuns para deixar iniciais mais distintivas
  const stop = ['da','de','do','das','dos','e','o','a'];
  const parts = text.split(/\s+/).filter(w => w.length > 1 && !stop.includes(w.toLowerCase())).slice(0,2);
  return parts.length ? parts.map(w => w[0]).join('').toUpperCase() : (text[0]||'?').toUpperCase();
}

// Logo do estabelecimento · PNG quando existe, senão SVG inline com paleta da marca
function empLogoHTML(emp){
  if(emp?.logo){
    const ini = getInitials(emp);
    return `<img src="${escapeHtml(emp.logo)}" alt="${escapeHtml(emp.estabelecimento||'')}" class="emp-logo-img lazy-img" loading="lazy" decoding="async" data-fallback="${escapeHtml(ini)}" onload="this.classList.add('loaded');this.parentElement?.classList.add('img-loaded')" onerror="lazyImgFail(this)">`;
  }
  const p = paletteFor(emp);
  const initials = getInitials(emp);
  // SVG inline · letras grandes + ornamento sutil em accent + grain leve para profundidade
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice">
    <rect width="200" height="200" fill="${p.bg}"/>
    <rect x="0" y="0" width="200" height="200" fill="url(#grad-${_hashStr(initials)})" opacity=".35"/>
    <defs>
      <radialGradient id="grad-${_hashStr(initials)}" cx="30%" cy="20%" r="70%">
        <stop offset="0%" stop-color="${p.accent}" stop-opacity=".4"/>
        <stop offset="100%" stop-color="${p.bg}" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <line x1="40" y1="155" x2="80" y2="155" stroke="${p.accent}" stroke-width="2" stroke-linecap="round"/>
    <text x="100" y="125" font-family="Bebas Neue, Impact, sans-serif" font-size="${initials.length>1?92:108}" font-weight="500" letter-spacing="-2" fill="${p.fg}" text-anchor="middle">${escapeHtml(initials)}</text>
  </svg>`;
  const dataUrl = 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
  return `<img src="${dataUrl}" alt="${escapeHtml(emp?.estabelecimento||'')}" class="emp-logo-img" loading="lazy">`;
}

// ── DATABASE LAYER ─────────────────────────────────────────────
const DB = {
  load(){
    try {
      const raw = localStorage.getItem(DB_KEY);
      if(raw) return JSON.parse(raw);
    } catch(e){ console.warn('DB load error', e); }
    return null;
  },
  save(data){
    try { localStorage.setItem(DB_KEY, JSON.stringify(data)); }
    catch(e){ console.warn('DB save error', e); }
  },
  reset(){
    const fresh = JSON.parse(JSON.stringify(SEED));
    this.save(fresh);
    return fresh;
  },
  init(){
    let data = this.load();
    // Migração · se schema antigo OU primeiro usuário sem foto, força reseed
    const needsReseed = !data
      || data._schemaVersion !== SEED_SCHEMA_VERSION
      || !(data.users && data.users.find(u => u.role === 'pro' && u.foto));
    if(needsReseed){
      console.log('[Turni] Schema atualizado · forçando reseed da demo (v' + SEED_SCHEMA_VERSION + ')');
      data = this.reset();
    }
    return data;
  }
};

let db = DB.init();

// ── SESSION LAYER ──────────────────────────────────────────────
const Session = {
  get(){
    try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)); }
    catch(e){ return null; }
  },
  set(userId){
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({userId, loginAt: Date.now()}));
  },
  clear(){
    sessionStorage.removeItem(SESSION_KEY);
  },
  user(){
    const s = this.get();
    if(!s) return null;
    return db.users.find(u => u.id === s.userId) || null;
  }
};

// ── ROUTER ─────────────────────────────────────────────────────
function route(){
  const hash = (location.hash || '#/login').replace('#','');
  const [path, query] = hash.split('?');
  console.log('[Turni] route ·', path, query || '');
  const params = {};
  if(query){
    query.split('&').forEach(kv => {
      const [k,v] = kv.split('=');
      params[decodeURIComponent(k)] = decodeURIComponent(v||'');
    });
  }
  const user = Session.user();

  // Auth gate · login E cadastro são acessíveis sem auth
  const isPublic = path === '/login' || path === '/cadastro' || path === '/cadastro/emp' || path === '/cadastro/wkr';
  if(!isPublic && !user){
    location.hash = '#/login';
    return;
  }

  // ── SPRINT A · Funnel gate · força ritual de aprovação ──
  // Profissional/contratante recém-aprovado precisa passar pelo welcome + cadastro completo
  // antes de acessar qualquer outra rota interna do app.
  if(user && user.ativo && (user.role === 'pro' || user.role === 'emp')){
    const inWelcome = path === '/welcome';
    const inCompletar = path === '/profissional/completar' || path === '/contratante/completar';
    if(user.welcomeSeen === false && !inWelcome && !inCompletar){
      location.hash = '#/welcome';
      return;
    }
    if(user.welcomeSeen && user.cadastroCompleto === false && !inCompletar && !inWelcome){
      location.hash = user.role === 'emp' ? '#/contratante/completar' : '#/profissional/completar';
      return;
    }
  }

  // Preserva sb-collapsed entre rotas · reseta apenas a class de role
  const wasCollapsed = document.body.classList.contains('sb-collapsed');
  document.body.className = '';
  if(wasCollapsed) document.body.classList.add('sb-collapsed');
  // Restaura do localStorage se ainda não aplicado
  try{ if(!wasCollapsed && localStorage.getItem('turni_sb_collapsed') === '1') document.body.classList.add('sb-collapsed'); }catch(e){}
  if(user){
    document.body.classList.add('body-' + (user.role === 'admin' ? 'admin' : user.role === 'emp' ? 'emp' : (user.ativo ? 'pro' : 'pending')));
  }

  if(path === '/login') return renderLogin(params);
  if(path === '/cadastro') return renderCadastroEscolha(params);
  if(path === '/cadastro/emp') return renderCadastro('emp', params);
  if(path === '/cadastro/wkr') return renderCadastro('wkr', params);
  if(path === '/welcome') return renderWelcome();
  if(path === '/profissional/completar') return renderProCadastroCompleto();
  if(path === '/contratante/completar') return renderEmpCadastroCompleto();
  if(path === '/admin') return renderAdmin(params);
  if(path === '/admin/aprovacoes') return renderAdminAprovacoes(params);
  if(path === '/admin/usuarios') return renderAdminUsuarios(params);
  if(path === '/contratante') return renderEmpDashboard(params);
  if(path === '/contratante/empresa') return renderEmpEmpresa(params);
  if(path === '/contratante/vagas') return renderEmpVagas(params);
  if(path === '/contratante/vagas/nova') return renderEmpVagaNova(params);
  if(path === '/contratante/vaga') return renderEmpVagaDetalhe(params);
  if(path === '/contratante/turnos') return renderEmpTurnos(params);
  if(path === '/contratante/turno') return renderEmpTurnoDetalhe(params);
  if(path === '/contratante/escala') return renderEmpEscala(params);
  if(path === '/contratante/equipe') return renderEmpEquipe(params);
  if(path === '/contratante/pagamentos') return renderEmpFinanceiro(params); // legacy
  if(path === '/contratante/financeiro') return renderEmpFinanceiro(params);
  if(path === '/contratante/atendimento') return renderEmpAtendimento(params);
  if(path === '/profissional') return renderProDashboard(params);
  if(path === '/profissional/feed') return renderProFeed(params);
  if(path === '/profissional/vaga') return renderProVagaDetalhe(params);
  if(path === '/profissional/candidaturas') return renderProCandidaturas(params);
  if(path === '/profissional/turnos') return renderProTurnos(params);
  if(path === '/profissional/turno') return renderProTurnoDetalhe(params);
  if(path === '/profissional/roster') return renderProFinanceiro(params); // legacy redirect
  if(path === '/profissional/financeiro') return renderProFinanceiro(params);
  if(path === '/profissional/perfil') return renderProPerfil(params);
  if(path === '/profissional/feedbacks') return renderProFeedbacks(params);
  // Fallback
  if(user.role === 'admin') location.hash = '#/admin';
  else if(user.role === 'emp') location.hash = '#/contratante';
  else location.hash = '#/profissional';
}

// When DB is modified in another tab, compare states, fire rich
// clickable notifications for the current user, then re-render.
window.addEventListener('storage', (e) => {
  if(e.key === DB_KEY){
    const prevDb = db;
    const newDb = DB.load() || db;
    notifyChanges(prevDb, newDb);
    db = newDb;
    route();
  }
});

// ── Rich notification system ──
let _notifId = 0;
function pushNotif({title, text, icon='bell', color='lime', onClick, persist=false}){
  const stack = document.getElementById('notifStack');
  if(!stack) return;
  const id = '_notif_' + (++_notifId);
  const el = document.createElement('div');
  el.className = 'notif ' + color;
  el.id = id;
  el.innerHTML = `
    <div class="notif-icon"><i data-lucide="${icon}"></i></div>
    <div class="notif-body">
      <div class="notif-title">${escapeHtml(title)}</div>
      <div class="notif-text">${text}</div>
    </div>
    <button class="notif-close" onclick="event.stopPropagation();dismissNotif('${id}')"><i data-lucide="x"></i></button>
  `;
  if(onClick){
    el.addEventListener('click', () => { try{ onClick(); }catch(e){} dismissNotif(id); });
  }
  stack.appendChild(el);
  refreshIcons();
  setTimeout(() => el.classList.add('show'), 20);
  if(!persist) setTimeout(() => dismissNotif(id), 6000);
}
function dismissNotif(id){
  const el = document.getElementById(id);
  if(!el) return;
  el.classList.remove('show');
  setTimeout(() => el.remove(), 350);
}

// Compare states and fire relevant notifications for the current user
function notifyChanges(prev, next){
  const session = Session.get();
  if(!session) return;
  const u = (next.users || []).find(x => x.id === session.userId);
  if(!u) return;

  // ─ PROFISSIONAL ─
  if(u.role === 'pro' && u.ativo){
    const myTurnosAntes = (prev.turnos||[]).filter(t => t.proId === u.id);
    const myTurnosAgora = (next.turnos||[]).filter(t => t.proId === u.id);

    // 1. Novo turno confirmado (candidatura aceita)
    myTurnosAgora.forEach(t => {
      const old = myTurnosAntes.find(p => p.id === t.id);
      if(!old && t.status === 'confirmado'){
        const vaga = next.vagas.find(v => v.id === t.vagaId);
        const emp = next.users.find(x => x.id === t.estabId);
        pushNotif({
          title:'CANDIDATURA ACEITA',
          text:`${escapeHtml(emp?.estabelecimento||'')} confirmou você para <b>${escapeHtml(vaga?.funcao||'')}</b>. Click para fazer check-in.`,
          icon:'party-popper', color:'lime',
          onClick:() => { location.hash = '#/profissional/turno?id=' + t.id; }
        });
      }
    });

    // 1.b Nova mensagem de chat de contratante para profissional
    myTurnosAgora.forEach(t => {
      const old = myTurnosAntes.find(p => p.id === t.id);
      if(!old) return;
      const oldMsgs = (old.chat||[]).length;
      const newMsgs = (t.chat||[]).length;
      if(newMsgs > oldMsgs){
        const lastMsg = t.chat[newMsgs-1];
        if(lastMsg.senderRole === 'emp'){
          const emp = next.users.find(x => x.id === t.estabId);
          pushNotif({
            title:`Mensagem de ${escapeHtml((emp?.nome||'').split(' ')[0])}`,
            text:escapeHtml(lastMsg.text.length > 80 ? lastMsg.text.slice(0,80)+'...' : lastMsg.text),
            icon:'message-circle', color:'orange',
            onClick:() => { location.hash = '#/profissional/turno?id=' + t.id; }
          });
        }
      }
      // Avaliação recebida do contratante (avaliacaoEmp)
      if(!old.avaliacaoEmp && t.avaliacaoEmp){
        const emp = next.users.find(x => x.id === t.estabId);
        pushNotif({
          title:'VOCÊ FOI AVALIADO',
          text:`<b>${escapeHtml((emp?.estabelecimento||'').split(' ')[0])}</b> deu <b>${t.avaliacaoEmp.stars}★</b> · ${t.avaliacaoEmp.comment ? '"'+escapeHtml(t.avaliacaoEmp.comment.slice(0,60))+'"' : 'sem comentários'}`,
          icon:'star', color:'yellow',
          onClick:() => { location.hash = '#/profissional/turno?id=' + t.id; }
        });
      }
    });

    // 2. Mudanças de status nos turnos existentes
    myTurnosAgora.forEach(t => {
      const old = myTurnosAntes.find(p => p.id === t.id);
      if(!old) return;
      if(old.status !== t.status){
        if(t.status === 'ativo'){
          pushNotif({
            title:'CHECK-IN VALIDADO',
            text:'Cronômetro bilateral iniciou · turno em curso.',
            icon:'play-circle', color:'blue',
            onClick:() => { location.hash = '#/profissional/turno?id=' + t.id; }
          });
        }
        if(t.status === 'finalizado'){
          pushNotif({
            title:'PIX EM ROTA',
            text:`<b>${fmtMoney(t.valor)}</b> em até 15 min via Pagar.me. Score atualizado.`,
            icon:'wallet', color:'fhp',
            onClick:() => { location.hash = '#/profissional/roster'; }
          });
        }
      }
      // Contratante recusou o check-in (deletou _pendingCheckInPin sem mudar status)
      if(old._pendingCheckInPin && !t._pendingCheckInPin && t.status === 'confirmado'){
        pushNotif({
          title:'CHECK-IN RECUSADO',
          text:'Contratante pediu novo PIN · gere outro check-in quando estiver no local.',
          icon:'alert-triangle', color:'orange',
          onClick:() => { location.hash = '#/profissional/turno?id=' + t.id; }
        });
      }
      // Contratante discordou do check-out (deletou pin sem finalizar)
      if(old._pendingCheckOutPin && !t._pendingCheckOutPin && t.status === 'ativo'){
        pushNotif({
          title:'VALOR EM CONTESTAÇÃO',
          text:'Contratante abriu mediação TURN<span class="di">I</span><span class="de">.</span> · resposta em até 30 min.',
          icon:'alert-circle', color:'orange',
          onClick:() => { location.hash = '#/profissional/turno?id=' + t.id; },
          persist:true
        });
      }
    });
  }

  // ─ CONTRATANTE ─
  if(u.role === 'emp'){
    const minhasVagasAntes = (prev.vagas||[]).filter(v => v.estabId === u.id);
    const minhasVagasAgora = (next.vagas||[]).filter(v => v.estabId === u.id);

    // 1. Nova candidatura
    minhasVagasAgora.forEach(v => {
      const old = minhasVagasAntes.find(p => p.id === v.id);
      if(!old) return;
      const novosIds = (v.candidatos||[]).filter(id => !(old.candidatos||[]).includes(id));
      if(novosIds.length > 0){
        const novo = next.users.find(x => x.id === novosIds[0]);
        pushNotif({
          title:'NOVO CANDIDATO',
          text:`<b>${escapeHtml(novo?.nome||'')}</b> se candidatou para <b>${escapeHtml(v.funcao)}</b> · click para ver match.`,
          icon:'user-plus', color:'lime',
          onClick:() => { location.hash = '#/contratante/vaga?id=' + v.id; }
        });
      }
    });

    // 1.b Mensagem de chat do profissional para contratante
    const meusTurnosAntes2 = (prev.turnos||[]).filter(t => t.estabId === u.id);
    const meusTurnosAgora2 = (next.turnos||[]).filter(t => t.estabId === u.id);
    meusTurnosAgora2.forEach(t => {
      const old = meusTurnosAntes2.find(p => p.id === t.id);
      if(!old) return;
      const oldMsgs = (old.chat||[]).length;
      const newMsgs = (t.chat||[]).length;
      if(newMsgs > oldMsgs){
        const lastMsg = t.chat[newMsgs-1];
        if(lastMsg.senderRole === 'pro'){
          const pro = next.users.find(x => x.id === t.proId);
          pushNotif({
            title:`Mensagem de ${escapeHtml((pro?.nome||'').split(' ')[0])}`,
            text:escapeHtml(lastMsg.text.length > 80 ? lastMsg.text.slice(0,80)+'...' : lastMsg.text),
            icon:'message-circle', color:'lime',
            onClick:() => { location.hash = '#/contratante/turno?id=' + t.id; }
          });
        }
      }
      // Avaliação recebida do profissional (avaliacaoPro)
      if(!old.avaliacaoPro && t.avaliacaoPro){
        const pro = next.users.find(x => x.id === t.proId);
        pushNotif({
          title:'VOCÊ FOI AVALIADO',
          text:`<b>${escapeHtml((pro?.nome||'').split(' ')[0])}</b> deu <b>${t.avaliacaoPro.stars}★</b> · ${t.avaliacaoPro.comment ? '"'+escapeHtml(t.avaliacaoPro.comment.slice(0,60))+'"' : 'sem comentários'}`,
          icon:'star', color:'yellow',
          onClick:() => { location.hash = '#/contratante/turno?id=' + t.id; }
        });
      }
    });

    // 2. Profissional fez check-in (gerou PIN)
    const meusTurnosAntes = (prev.turnos||[]).filter(t => t.estabId === u.id);
    const meusTurnosAgora = (next.turnos||[]).filter(t => t.estabId === u.id);
    meusTurnosAgora.forEach(t => {
      const old = meusTurnosAntes.find(p => p.id === t.id);
      if(!old) return;
      if(!old._pendingCheckInPin && t._pendingCheckInPin){
        const pro = next.users.find(x => x.id === t.proId);
        const vaga = next.vagas.find(v => v.id === t.vagaId);
        pushNotif({
          title:'PROFISSIONAL CHEGOU',
          text:`<b>${escapeHtml((pro?.nome||'').split(' ')[0])}</b> fez check-in para <b>${escapeHtml(vaga?.funcao||'')}</b> · valide o PIN.`,
          icon:'map-pin', color:'yellow',
          onClick:() => { location.hash = '#/contratante/turno?id=' + t.id; }
        });
      }
      // Profissional encerrou o turno e gerou PIN de check-out (NOVO FLUXO)
      if(!old._pendingCheckOutPin && t._pendingCheckOutPin){
        const pro = next.users.find(x => x.id === t.proId);
        pushNotif({
          title:'TURNO ENCERRADO',
          text:`<b>${escapeHtml((pro?.nome||'').split(' ')[0])}</b> finalizou · valide o PIN para pagar <b>${fmtMoney(totalEmp(t.valor))}</b> (${fmtMoney(t.valor)} + ${fmtMoney(taxaTurni(t.valor))} taxa).`,
          icon:'check-circle', color:'orange',
          onClick:() => { location.hash = '#/contratante/turno?id=' + t.id; }
        });
      }
      // Mudança de status pelo profissional
      if(old.status !== t.status){
        if(t.status === 'ativo'){
          pushNotif({title:'TURNO INICIADO', text:'Cronômetro bilateral rodando.', icon:'play-circle', color:'blue',
            onClick:() => { location.hash = '#/contratante/turno?id=' + t.id; }});
        }
        if(t.status === 'finalizado'){
          const pro = next.users.find(x => x.id === t.proId);
          pushNotif({title:'TURNO FINALIZADO',
            text:`Pago <b>${fmtMoney(totalEmp(t.valor))}</b> · ${fmtMoney(t.valor)} para ${escapeHtml((pro?.nome||'').split(' ')[0])} + ${fmtMoney(taxaTurni(t.valor))} taxa TURN<span class="di">I</span><span class="de">.</span>.`,
            icon:'check-circle-2', color:'fhp',
            onClick:() => { location.hash = '#/contratante/financeiro'; }});
        }
      }
    });
  }

  // ─ ADMIN ─
  if(u.role === 'admin'){
    const pendingAntes = (prev.users||[]).filter(x => x.role==='pro' && !x.ativo).length;
    const pendingAgora = (next.users||[]).filter(x => x.role==='pro' && !x.ativo).length;
    if(pendingAgora > pendingAntes){
      pushNotif({title:'NOVO PRÉ-CADASTRO', text:'Profissional aguardando aprovação.', icon:'user-clock', color:'yellow',
        onClick:() => { location.hash = '#/admin/aprovacoes'; }});
    }
  }
}

// ── HELPERS ────────────────────────────────────────────────────
function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'2-digit'});
}
function fmtDateTime(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
}
function fmtMoney(v){ return 'R$ ' + (v||0).toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:2}); }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Saudação dinâmica conforme horário · Bom dia / Boa tarde / Boa noite
function greeting(){
  const h = new Date().getHours();
  if(h >= 5 && h < 12) return 'Bom dia';
  if(h >= 12 && h < 18) return 'Boa tarde';
  return 'Boa noite';
}
function firstName(full){ return (full||'').toString().trim().split(/\s+/)[0] || ''; }

// Depoimentos recebidos · turnos finalizados com avaliação comentada
// role='pro' → pega avaliacaoEmp (o que o contratante disse do trabalhador)
// role='emp' → pega avaliacaoPro (o que o trabalhador disse do contratante)
function getDepoimentos(userId, role){
  const key = role === 'pro' ? 'avaliacaoEmp' : 'avaliacaoPro';
  const otherKey = role === 'pro' ? 'estabId' : 'proId';
  return (db.turnos || [])
    .filter(t => t.status === 'finalizado'
      && (role === 'pro' ? t.proId === userId : t.estabId === userId)
      && t[key] && t[key].comment)
    .map(t => {
      const otherUser = db.users.find(u => u.id === t[otherKey]);
      const date = t.checkOut ? new Date(t.checkOut) : null;
      return {
        stars: t[key].stars,
        comment: t[key].comment,
        autor: role === 'pro' ? (otherUser?.estabelecimento || otherUser?.nome || 'Cliente') : (otherUser?.nome || 'Profissional'),
        autorRole: role === 'pro' ? 'Contratante' : (otherUser?.funcao || 'Profissional'),
        autorAvatar: otherUser?.avatar || null,
        autorLogo: role === 'pro' ? otherUser?.logo : null,
        date
      };
    })
    .sort((a,b) => (b.date || 0) - (a.date || 0));
}

function depoimentoCardHTML(dep){
  const stars = '★'.repeat(dep.stars) + '☆'.repeat(5 - dep.stars);
  const dateStr = dep.date ? dep.date.toLocaleDateString('pt-BR', {day:'2-digit', month:'short'}) : '';
  const avatar = dep.autorLogo
    ? `<img src="${escapeHtml(dep.autorLogo)}" alt="" style="width:100%;height:100%;object-fit:contain;padding:6px;background:#fff">`
    : `<span>${escapeHtml((dep.autor||'?').charAt(0).toUpperCase())}</span>`;
  return `
    <div class="depoimento-card">
      <div class="dep-stars">${stars}</div>
      <div class="dep-comment">"${escapeHtml(dep.comment)}"</div>
      <div class="dep-autor">
        <div class="dep-avatar">${avatar}</div>
        <div class="dep-autor-info">
          <div class="dep-autor-nome">${escapeHtml(dep.autor)}</div>
          <div class="dep-autor-role">${escapeHtml(dep.autorRole)}${dateStr ? ' · '+dateStr : ''}</div>
        </div>
      </div>
    </div>
  `;
}

// ── Modelo de cobrança ──
// Taxa cobrada do CONTRATANTE (não do profissional). Profissional recebe valor cheio.
const TAKE_RATE = 0.15;
function valorProf(v){ return v; }                    // profissional recebe integral
function taxaTurni(v){ return v * TAKE_RATE; }        // TURN<span class="di">I</span><span class="de">.</span> cobra do contratante
function totalEmp(v){ return v * (1 + TAKE_RATE); }   // contratante paga valor + taxa

function showToast(msg, type){
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.toggle('error', type === 'error');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function openModal(html){
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modalBg').classList.add('open');
  refreshIcons();
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
}

function logout(){
  Session.clear();
  location.hash = '#/login';
  showToast('Sessão encerrada');
}

function login(userId){
  const u = db.users.find(x => x.id === userId);
  if(!u){ showToast('Usuário inválido', 'error'); return; }
  Session.set(userId);
  // Sprint B.4 · loginCount habilita gates pós-Nº login (ex: PWA install banner pós-2º login)
  u.loginCount = (u.loginCount || 0) + 1;
  u.lastLoginAt = new Date().toISOString();
  DB.save(db);
  showToast(`Olá, ${u.nome.split(' ')[0]}`);
  if(u.role === 'admin') location.hash = '#/admin';
  else if(u.role === 'emp') location.hash = '#/contratante';
  else location.hash = '#/profissional';
}

function approvePro(proId){
  const u = db.users.find(x => x.id === proId);
  if(!u) return;
  u.ativo = true;
  u.status = 'liberado';
  // Defaults preliminares · serão refinados na tela de cadastro completo
  u.nivel = u.nivel || 'Iniciante';
  u.score = u.score || 5.0;
  u.mei = false; // será confirmado via upload no cadastro completo
  u.raio = u.raio || 5;
  u.precoHora = u.precoHora || 26;
  // Sprint A · novos flags do funil de aprovação
  u.welcomeSeen = false;       // mostra tela de boas-vindas no próximo login
  u.cadastroCompleto = false;  // bloqueia uso até completar dados sensíveis
  u.aprovadoPor = 'admin-1';
  u.aprovadoEm = new Date().toISOString();
  DB.save(db);
  showToast(`${u.nome.split(' ')[0]} liberado · será guiado pelo onboarding`);
  closeModal();
  route();
}
function rejectPro(proId){
  if(!confirm('Recusar este profissional? Ele será removido da fila.')) return;
  db.users = db.users.filter(x => x.id !== proId);
  DB.save(db);
  showToast('Profissional recusado');
  closeModal();
  route();
}

function approveEmp(empId){

function rejectEmp(empId){
  if(!confirm('Recusar este contratante? Ele será removido da fila.')) return;

// Sprint A.4 · navega entre os 2 steps do wizard mobile do pré-cadastro
function cadWizGo(targetStep){
  const form = document.getElementById('cadastroForm');
  if(!form) return;
  const current = +form.getAttribute('data-cad-step') || 1;
  // Avançando · valida campos obrigatórios do step atual
  if(targetStep > current){
    const stepEl = form.querySelector('.cad-step-' + current);
    const inputs = stepEl ? stepEl.querySelectorAll('input[required], select[required]') : [];
    for(const inp of inputs){
      if(!inp.value || (inp.type === 'email' && !/^[^@]+@[^@]+\.[^@]+$/.test(inp.value))){
        inp.focus();
        inp.classList.add('cad-error');
        showToast('Preencha todos os campos antes de avançar', 'error');
        setTimeout(() => inp.classList.remove('cad-error'), 2000);
        return;
      }
    }
  }
  // Aplica troca
  form.setAttribute('data-cad-step', targetStep);
  form.querySelectorAll('.cad-step').forEach(s => s.classList.remove('cad-step-active'));
  form.querySelector('.cad-step-' + targetStep)?.classList.add('cad-step-active');
  // Atualiza barra
  const bar = document.getElementById('cadWizBar');
  const lbl = document.getElementById('cadWizLabel');
  if(bar) bar.classList.toggle('step-2', targetStep === 2);
  if(lbl) lbl.textContent = targetStep === 1 ? 'Passo 1 de 2 · Identificação' : 'Passo 2 de 2 · Contexto';
  // Botão "voltar"
  const prevBtn = form.querySelector('.cad-wiz-prev');
  if(prevBtn) prevBtn.style.display = targetStep === 1 ? 'none' : 'inline-flex';
  // Toggle: o botão "voltar" passa a chamar cadWizGo(1)
  if(prevBtn) prevBtn.setAttribute('onclick', 'cadWizGo(' + (targetStep - 1) + ')');
  // Toggle: o botão "continuar" passa a chamar cadWizGo(2) (de volta no caso de step 1)
  const nextBtn = form.querySelector('.cad-wiz-next');
  if(nextBtn) nextBtn.setAttribute('onclick', 'cadWizGo(' + (targetStep + 1) + ')');
  // Scroll suave para o topo do form (telas pequenas)
  form.scrollIntoView({behavior:'smooth', block:'start'});
}

  const admins = db.users.filter(u => u.role === 'admin');
  const empsOk = db.users.filter(u => u.role === 'emp' && u.ativo);

  const emps = [...empsOk, ...empsPending];
  const prosOk = db.users.filter(u => u.role === 'pro' && u.ativo);
  const prosPending = db.users.filter(u => u.role === 'pro' && !u.ativo);

  function renderDemoRow(u){
    const cls =
      u.role === 'admin' ? 'role-admin' :
      (u.role === 'emp' && !u.ativo) ? 'role-emp-pending' :
      u.role === 'emp' ? 'role-emp' :
      u.ativo ? 'role-pro' : 'role-pro-pending';
    const roleName =
      u.role === 'admin' ? 'Super Admin · acesso total' :
      (u.role === 'emp' && !u.ativo) ? `${escapeHtml(u.estabelecimento||'')} · pré-cadastro` :
      u.role === 'emp' ? `${escapeHtml(u.estabelecimento||'')} · plano ${escapeHtml(u.plano||'')}` :
      u.ativo ? `${escapeHtml(u.funcao||'')} · ${escapeHtml(u.nivel||'')} · ${(u.score||0).toFixed(1)}★ · ${u.turnos||0} turnos` :
      `${escapeHtml(u.funcao||'')} · cadastro pendente`;
    return `
      <div class="login-demo-row ${cls}" onclick="login('${u.id}')">
        <div class="login-demo-avatar">${avatarHTML(u)}</div>
        <div class="login-demo-info">
          <div class="login-demo-name">${escapeHtml(u.nome)}</div>
          <div class="login-demo-role">${roleName}</div>
        </div>
        <div class="login-demo-arrow"><i data-lucide="arrow-right"></i></div>

    else if(filter === 'admin') list = admins;

    else if(filter === 'pro') list = [...prosOk, ...prosPending];
    return list.map(renderDemoRow).join('');

  // Sub-headline da imagem hero · varia conforme persona indicada na landing

// Substitui a sensação de "banner mais um do app" por um momento de impacto
// 2 cards face-to-face (contratante + trabalhador) + handshake center + logo TURNI rodapé
function showMatchModal(opts){
  const { event = 'match', headline, desc, emp, pro, ctaLabel, ctaHash } = opts;
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const themeClass = isDark ? '' : 'theme-light';

  const empAvatar = emp?.logo
    ? `<div class="match-card-avatar logo-mode"><img src="${escapeHtml(emp.logo)}" alt="${escapeHtml(emp.estabelecimento||emp.nome||'')}"></div>`
    : `<div class="match-card-avatar">${avatarHTML(emp||{})}</div>`;
  const proAvatar = pro?.foto
    ? `<div class="match-card-avatar"><img src="${escapeHtml(pro.foto)}" alt="${escapeHtml(pro.nome||'')}"></div>`
    : `<div class="match-card-avatar">${avatarHTML(pro||{})}</div>`;

  const empMeta = emp?.estabelecimento ? escapeHtml(emp.estabelecimento) : (emp?.cnpj ? 'CNPJ '+escapeHtml(emp.cnpj) : '');
  const proMeta = pro ? `${escapeHtml(pro.funcao||'')}${pro.score ? ' · '+pro.score.toFixed(1)+' ★' : ''}` : '';

  const eventIcons = {
    vaga:'send', match:'sparkles', candidatura:'user-check', checkin:'login', checkout:'log-out', chat:'message-circle'
  };
  const evIcon = eventIcons[event] || 'sparkles';

  // Entra em FOCUS MODE · esconde sidebar, bottom-nav, fab, banners
  document.body.classList.add('match-focused');

  const me = Session.user();
  const homeHash = me?.role === 'emp' ? '#/contratante' : me?.role === 'pro' ? '#/profissional' : me?.role === 'admin' ? '#/admin' : '#/login';

  const wrap = document.createElement('div');
  wrap.className = 'match-modal-bg show';
  wrap.innerHTML = `
    <a class="match-back-home" href="${homeHash}" aria-label="Voltar para a home">
      <i data-lucide="arrow-left"></i> Voltar para a home
    </a>
    <div class="match-modal ${themeClass}">
      <button class="match-close" aria-label="Fechar"><i data-lucide="x"></i></button>
      <div class="match-event">
        <div class="match-event-tag"><i data-lucide="${evIcon}"></i><span>${escapeHtml(event.toUpperCase())}</span></div>
        <h3 class="match-event-h">${escapeHtml(headline||'Conexão TURNI.')}</h3>
        ${desc ? `<p class="match-event-d">${desc}</p>` : ''}
      </div>

      <div class="match-handshake">
        <div class="match-card emp">
          <span class="match-card-tag">contratante</span>
          ${empAvatar}
          <div class="match-card-name">${escapeHtml(emp?.estabelecimento || emp?.nome || '—')}</div>
          ${empMeta ? `<div class="match-card-meta">${empMeta}</div>` : ''}
          ${emp?.bairro ? `<div class="match-card-extra"><span><i data-lucide="map-pin"></i>${escapeHtml(emp.bairro)}</span></div>` : ''}
        </div>

        <div class="match-link">
          <div class="match-link-icon"><i data-lucide="${evIcon}"></i></div>
        </div>

        <div class="match-card pro">
          <span class="match-card-tag">profissional</span>
          ${proAvatar}
          <div class="match-card-name">${escapeHtml(pro?.nome || '—')}</div>
          ${proMeta ? `<div class="match-card-meta">${proMeta}</div>` : ''}
          ${pro?.turnos ? `<div class="match-card-extra"><span><i data-lucide="check-circle"></i>${pro.turnos} turnos</span></div>` : ''}
        </div>
      </div>

      ${ctaHash ? `<a class="match-cta" href="${ctaHash}">${escapeHtml(ctaLabel||'CONTINUAR')} <i data-lucide="arrow-right"></i></a>` : ''}

      ${renderMatchTimeline(event)}

      <div class="match-foot">
        <div class="match-foot-tag">conectados via</div>
        <div class="match-foot-logo">TURN<span class="di">I</span><span class="de">.</span></div>
      </div>
    </div>
  `;

  // Close handlers · sai do focus mode também
  const close = () => {
    wrap.style.opacity = '0';
    document.body.classList.remove('match-focused');
    setTimeout(() => wrap.remove(), 250);
  };
  wrap.querySelector('.match-close').addEventListener('click', close);
  wrap.addEventListener('click', (e) => { if(e.target === wrap) close(); });
  // Botão "Voltar para a home" · também sai do focus mode
  const backHome = wrap.querySelector('.match-back-home');
  if(backHome) backHome.addEventListener('click', () => setTimeout(close, 150));
  // CTA leva pra ação · também fecha o modal antes de navegar
  const cta = wrap.querySelector('.match-cta');
  if(cta) cta.addEventListener('click', () => setTimeout(close, 150));

  document.body.appendChild(wrap);
  if(window.lucide) lucide.createIcons();
}

// Renderiza a timeline horizontal dos 8 marcos · destaca o atual conforme o evento
// Marco 8 (Feedback) é obrigatório para finalizar a jornada
function renderMatchTimeline(currentEvent){
  const map = {
    'vaga': 0, 'vaga publicada': 0,
    'candidatura': 1, 'candidatura recebida': 1,
    'match': 2, 'match estabelecido': 2,
    'check-in': 3, 'checkin-gen': 3, 'check-in iniciado': 3,
    'checkin-ok': 4, 'turno iniciado': 4,
    'check-out': 5, 'checkout-gen': 5, 'check-out iniciado': 5,
    'checkout-ok': 6, 'pagamento liberado': 6,
    'feedback': 7, 'feedback pendente': 7, 'avaliacao': 7
  };
  const idx = map[currentEvent] ?? -1;
  const steps = [
    { icon:'send', label:'Vaga' },
    { icon:'user-plus', label:'Candidatura' },
    { icon:'sparkles', label:'Match' },
    { icon:'map-pin', label:'Check-in' },
    { icon:'activity', label:'Em curso' },
    { icon:'log-out', label:'Check-out' },
    { icon:'credit-card', label:'Pix' },
    { icon:'star', label:'Feedback' }
  ];
  const fillPct = idx >= 0 ? ((idx) / (steps.length - 1)) * 100 : 0;
  const html = steps.map((s, i) => {
    let cls = '';
    if(i < idx) cls = 'done';
    else if(i === idx) cls = 'current';
    const innerIcon = i < idx ? '<i data-lucide="check"></i>' : `<i data-lucide="${s.icon}"></i>`;
    return `
      <div class="match-tl-step ${cls}">
        <div class="match-tl-dot">${innerIcon}</div>
        <div class="match-tl-label">${s.label}</div>
      </div>
    `;
  }).join('');
  return `
    <div class="match-timeline">
      <div class="match-timeline-tag">jornada do turno · 8 marcos</div>
      <div class="match-tl-track">
        <div class="match-tl-fill" style="width:calc((${fillPct}% * (1 - 16/100)))"></div>
        ${html}
      </div>
    </div>
  `;

const ONBOARDING_KEY = 'turni_onb_v1';
function maybeShowOnboarding(user){
  if(!user || !user.ativo) return;
  if(user.role !== 'pro' && user.role !== 'emp') return;
  try{ if(localStorage.getItem(ONBOARDING_KEY) === '1') return; }catch(e){ return; }

  const slidesPro = [
    { icon:'compass', title:'Bem-vindo à TURNI.', desc:'Aqui você vende turnos com autonomia. Escolhe o lugar, o horário e o preço. Sua agenda é sua empresa.' },
    { icon:'star', title:'Score que vale plantão', desc:'Cada turno bem feito sobe seu score. Score alto = prioridade nas vagas premium e mais oportunidades de renda.' },
    { icon:'zap', title:'Pix em 15 minutos', desc:'Após o check-out validado, o pagamento cai direto na sua conta via Pix em até 15 minutos. Sem espera, sem desconto.' }
  ];
  const slidesEmp = [
    { icon:'plus-circle', title:'Bem-vindo à TURNI.', desc:'Aqui você cobre escala que muda. Publique uma vaga e nosso match IA encontra o profissional certo em até 2 horas.' },
    { icon:'shield-check', title:'Compliance garantido', desc:'PIN bilateral no check-in valida presença. Pagar.me processa o pagamento. Documentação trabalhista padronizada.' },
    { icon:'credit-card', title:'Só paga quando funcionar', desc:'Pré-autorização no cartão. O valor só é cobrado quando o profissional faz check-in. Risco zero.' }
  ];

  const slides = user.role === 'pro' ? slidesPro : slidesEmp;
  let i = 0;

  const overlay = document.createElement('div');
  overlay.className = 'onb-overlay';
  function render(){
    const s = slides[i];
    overlay.innerHTML = `
      <div class="onb-modal">
        <button class="onb-skip" onclick="window.skipOnboarding()">Pular tour</button>
        <div class="onb-icon"><i data-lucide="${s.icon}"></i></div>
        <div class="onb-title">${s.title}</div>
        <div class="onb-desc">${s.desc}</div>
        <div class="onb-dots">
          ${slides.map((_,k) => `<div class="onb-dot ${k===i?'active':''}"></div>`).join('')}
        </div>
        <div class="onb-actions">
          ${i > 0 ? '<button class="onb-btn" onclick="window.onbPrev()">Voltar</button>' : ''}
          <button class="onb-btn primary" onclick="window.onbNext()">${i === slides.length-1 ? 'Começar a usar' : 'Próximo'}</button>
        </div>
      </div>
    `;
    if(window.lucide) lucide.createIcons();
  }
  window.onbNext = function(){
    if(i < slides.length-1){ i++; render(); }
    else{ window.skipOnboarding(); }
  };
  window.onbPrev = function(){ if(i > 0){ i--; render(); } };
  window.skipOnboarding = function(){
    try{ localStorage.setItem(ONBOARDING_KEY, '1'); }catch(e){}
    overlay.remove();
  };

  render();
  document.body.appendChild(overlay);
}

let _deferredPrompt = null;
let _pwaPromptShown = false;
const PWA_DISMISS_GRACE = 7 * 24 * 60 * 60 * 1000; // 7 dias

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredPrompt = e;
  console.log('[Turni] beforeinstallprompt capturado · banner pode aparecer no próximo eligibility check');

});

// Roda após cada route() para checar se devemos mostrar o banner
function evaluatePWABanner(){
  if(_pwaPromptShown) return;
  if(!_deferredPrompt) return; // navegador ainda não disparou o evento
  // Apenas mobile · banner é display:none em desktop pelo CSS, mas evitamos lógica extra
  if(window.innerWidth >= 900) return;
  // Apenas para profissional liberado · contratante usa mais web
  const u = Session.user();
  if(!u || u.role !== 'pro' || !u.ativo) return;
  // Apenas após 2º login bem-sucedido
  if((u.loginCount || 0) < 2) return;
  // Respeita dispensa recente
  if(u.pwaPromptDismissedAt && (Date.now() - u.pwaPromptDismissedAt) < PWA_DISMISS_GRACE) return;
  // Não aparece se já está rodando como PWA standalone
  if(window.matchMedia('(display-mode: standalone)').matches) return;
  // OK · mostra
  showPWABanner();
}

function showPWABanner(){
  if(_pwaPromptShown) return;
  _pwaPromptShown = true;
  let el = document.getElementById('pwaInstallBanner');
  if(!el){
    el = document.createElement('div');
    el.id = 'pwaInstallBanner';
    el.className = 'pwa-install-banner';
    el.innerHTML = `
      <div class="pwa-install-icon"><i data-lucide="download"></i></div>
      <div class="pwa-install-info">
        <div class="pwa-install-h">Instale o TURN<span class="di">I</span><span class="de">.</span> no celular</div>
        <div class="pwa-install-d">Funciona offline · receba turnos no momento que abrirem</div>
      </div>
      <div class="pwa-install-actions">
        <button class="pwa-install-btn" onclick="installPWA()">Instalar</button>
        <button class="pwa-install-dismiss" onclick="dismissPWABanner()" aria-label="Dispensar"><i data-lucide="x"></i></button>
      </div>
    `;
    document.body.appendChild(el);
    if(window.lucide) lucide.createIcons();
  }
  setTimeout(() => el.classList.add('show'), 50);
}

function dismissPWABanner(){
  const u = Session.user();
  if(u){
    u.pwaPromptDismissedAt = Date.now();
    DB.save(db);
  }
  const el = document.getElementById('pwaInstallBanner');
  if(el){

}

window.installPWA = function(){
  if(!_deferredPrompt) return;
  _deferredPrompt.prompt();
  _deferredPrompt.userChoice.then((choice) => {
    if(choice.outcome === 'accepted'){
      console.log('[Turni] PWA instalado pelo usuário');
    }
    _deferredPrompt = null;

// ─── P1.5 · PULL-TO-REFRESH em mobile ───
// Touch gestures · usuário arrasta pra baixo no topo da página, libera = refresh
(function(){
  if(!('ontouchstart' in window)) return;
  let startY = 0, currentY = 0, pulling = false, threshold = 70;
  let indicator = null;

  function ensureIndicator(){
    if(indicator) return indicator;
    indicator = document.createElement('div');
    indicator.className = 'ptr-indicator';
    indicator.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"></path></svg> <span>Atualizando…</span>';
    document.body.appendChild(indicator);
    return indicator;
  }

  document.addEventListener('touchstart', (e) => {
    if(window.scrollY > 0) return;
    startY = e.touches[0].clientY;
    pulling = true;
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if(!pulling) return;
    currentY = e.touches[0].clientY;
    const diff = currentY - startY;
    if(diff > 0 && window.scrollY === 0){
      const ind = ensureIndicator();
      if(diff > threshold){ ind.classList.add('show') }
      else{ ind.classList.remove('show') }
    }
  }, { passive: true });

  document.addEventListener('touchend', () => {
    if(!pulling) return;
    pulling = false;
    const diff = currentY - startY;
    const ind = document.querySelector('.ptr-indicator');
    if(diff > threshold && ind){
      ind.classList.add('show', 'refreshing');
      try { route && route(); } catch(e){}
      setTimeout(() => {
        ind.classList.remove('show', 'refreshing');
      }, 700);
    } else if(ind) {
      ind.classList.remove('show');
    }
    startY = currentY = 0;
  }, { passive: true });
})();

// ── CHAT bilateral ──
// Disponível do aceite (status='confirmado') até o check-in validado (status='ativo').
// Após check-in: histórico fica visível mas envio fica bloqueado.
function getChatPanel(t, currentUser){
  if(!t || (currentUser.role !== 'pro' && currentUser.role !== 'emp')) return '';
  // Não mostrar chat se ainda nem foi confirmado ou se já cancelado
  if(t.status !== 'confirmado' && t.status !== 'ativo' && t.status !== 'finalizado') return '';
  // Só mostrar para os 2 envolvidos
  if(currentUser.role === 'pro' && t.proId !== currentUser.id) return '';
  if(currentUser.role === 'emp' && t.estabId !== currentUser.id) return '';

  const isOpen = t.status === 'confirmado'; // chat só é editável até check-in
  const messages = t.chat || [];
  const otherRole = currentUser.role === 'pro' ? 'emp' : 'pro';
  const other = currentUser.role === 'pro'
    ? db.users.find(x => x.id === t.estabId)
    : db.users.find(x => x.id === t.proId);

  const msgsHTML = messages.length === 0 ? `
    <div class="chat-empty-state">
      <i data-lucide="message-circle"></i>
      <span>${isOpen ? 'Inicie a conversa · combine detalhes do trajeto e chegada' : 'Nenhuma mensagem trocada'}</span>
    </div>
  ` : messages.map(m => {
    const sender = db.users.find(x => x.id === m.senderId);
    const isMe = m.senderId === currentUser.id;
    const fromCls = m.senderRole === 'pro' ? 'from-pro' : 'from-emp';
    const time = new Date(m.timestamp);
    const tStr = `${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`;
    return `
      <div class="msg ${isMe ? 'me' : ''} ${fromCls}">
        <div class="msg-avatar">${avatarHTML(sender)}</div>
        <div class="msg-content">
          <div class="msg-bubble">${escapeHtml(m.text)}</div>
          <div class="msg-time">${tStr}</div>
        </div>
      </div>
    `;
  }).join('');

  const inputHTML = isOpen ? `
    <div class="chat-input-row">
      <input type="text" class="chat-input" id="chatInput-${t.id}" placeholder="Mensagem para ${escapeHtml((other?.nome||'').split(' ')[0])}..." onkeydown="if(event.key==='Enter'){sendChatMessage('${t.id}');event.preventDefault()}" maxlength="280">
      <button class="chat-send" onclick="sendChatMessage('${t.id}')">
        <i data-lucide="send"></i> Enviar
      </button>
    </div>
  ` : `
    <div class="chat-locked">
      <i data-lucide="lock"></i>
      ${t.status === 'ativo' ? 'Chat encerrado · profissional já está no local' :
        t.status === 'finalizado' ? 'Turno finalizado · histórico arquivado' :
        'Chat bloqueado'}
    </div>
  `;

  return `
    <div class="chat-panel">
      <div class="chat-header">
        <i data-lucide="message-circle"></i>
        <h3>Chat com ${escapeHtml((other?.nome||'').split(' ')[0])}</h3>
        <span class="chat-status ${isOpen ? '' : 'closed'}">
          <i data-lucide="${isOpen ? 'circle' : 'lock'}"></i>
          ${isOpen ? 'Aberto' : 'Encerrado'}
        </span>
      </div>
      <div class="chat-body" id="chatBody-${t.id}">
        ${msgsHTML}
      </div>
      ${inputHTML}
    </div>
  `;
}

function sendChatMessage(turnoId){
  const u = Session.user();
  const input = document.getElementById('chatInput-' + turnoId);
  if(!input || !u) return;
  const text = input.value.trim();
  if(!text) return;
  const t = db.turnos.find(x => x.id === turnoId);
  if(!t) return;
  if(t.status !== 'confirmado'){
    showToast('Chat encerrado · profissional já chegou', 'error');
    return;
  }
  if(!t.chat) t.chat = [];
  t.chat.push({
    id: 'm-' + Date.now() + '-' + Math.floor(Math.random()*1000),
    senderId: u.id,
    senderRole: u.role,
    text,
    timestamp: new Date().toISOString()
  });
  DB.save(db);
  input.value = '';
  route();
  // Scroll do chat para o final
  setTimeout(() => {
    const body = document.getElementById('chatBody-' + turnoId);
    if(body) body.scrollTop = body.scrollHeight;
    document.getElementById('chatInput-' + turnoId)?.focus();
  }, 50);
}

      <div class="stars-row" id="starsRow-${t.id}">

          <button class="star-btn" data-stars="${n}" onclick="selectStars('${t.id}', ${n})">
            <i data-lucide="star"></i>
          </button>
        `).join('')}
      </div>
      <textarea class="rating-comment" id="ratingComment-${t.id}" placeholder="Comentário opcional · ajuda a TURN<span class="di">I</span><span class="de">.</span> a melhorar a plataforma" maxlength="280"></textarea>
      <div style="display:flex;justify-content:center">
        <button class="btn-primary" onclick="submitRating('${t.id}')">
          <i data-lucide="send"></i> Enviar avaliação
        </button>
      </div>
    </div>
  `;
}

let _selectedStars = {};
function selectStars(turnoId, n){
  _selectedStars[turnoId] = n;
  const row = document.getElementById('starsRow-' + turnoId);
  if(!row) return;
  row.querySelectorAll('.star-btn').forEach((btn, idx) => {
    btn.classList.toggle('filled', idx < n);
  });
}

function submitRating(turnoId){
  const u = Session.user();
  if(!u) return;
  const stars = _selectedStars[turnoId];
  if(!stars){ showToast('Selecione de 1 a 5 estrelas', 'error'); return; }
  const comment = document.getElementById('ratingComment-' + turnoId)?.value.trim() || '';
  const t = db.turnos.find(x => x.id === turnoId);
  if(!t) return;
  const key = u.role === 'pro' ? 'avaliacaoPro' : 'avaliacaoEmp';
  t[key] = { stars, comment, ratedAt: new Date().toISOString() };

  // Se o contratante avaliou o profissional, atualiza o score do profissional com peso da avaliação real
  if(u.role === 'emp'){
    const pro = db.users.find(x => x.id === t.proId);
    if(pro && pro.score){
      // Score = média móvel ponderada com peso 15% na avaliação atual
      pro.score = Math.round((pro.score * 0.85 + stars * 0.15) * 10) / 10;
    }
  }

  DB.save(db);
  delete _selectedStars[turnoId];
  showToast('Avaliação enviada · obrigado!');
  fireMatchEvent('feedback', { turno: t });
  route();
}

// Banner persistente em qualquer rota · sinaliza ações pendentes que exigem atenção
// Sprint A.3 · helpers do feedback gate (gate de reputação)
// Retorna o turno finalizado mais recente sem avaliação dada pela persona
function pendingFeedbackTurno(u){
  if(!u || (u.role !== 'pro' && u.role !== 'emp')) return null;
  const turnos = db.turnos.filter(t => t.status === 'finalizado'
    && (u.role === 'pro' ? t.proId === u.id : t.estabId === u.id));
  return turnos.find(t => u.role === 'pro' ? !t.avaliacaoPro : !t.avaliacaoEmp) || null;
}

// ── Match calculation (IA simulada) ──
// 40% função idêntica + 20% raio (mock=ok) + 30% score normalizado + 10% nível
function calcMatch(pro, vaga){
  if(!pro || !vaga) return 0;
  let score = 0;
  if((pro.funcao||'').toLowerCase() === (vaga.funcao||'').toLowerCase()) score += 40;
  // Estabelecimento dentro do raio do profissional — mockado como ok
  score += 20;
  // Score normalizado (4.0-5.0 → 0-30)
  if(pro.score) score += Math.round((pro.score - 4) * 30);
  // Bônus de nível
  const niveis = {Iniciante:0, Confiável:3, Destaque:6, Elite:10};
  score += niveis[pro.nivel] || 0;
  return Math.min(100, Math.max(0, score));
}

// Sprint C.2 · Breakdown explicativo do match · transparência
function calcMatchBreakdown(pro, vaga){
  if(!pro || !vaga) return [];
  const items = [];
  // Função primária ou secundária
  const funcs = [pro.funcao, pro.funcao2, pro.funcao3].filter(Boolean).map(f => f.toLowerCase());
  const vagaFn = (vaga.funcao||'').toLowerCase();
  const fnMatch = funcs.indexOf(vagaFn);
  items.push({
    icon:'briefcase', label:'Função',
    detail: fnMatch === 0 ? `Sua função primária bate exatamente · ${escapeHtml(vaga.funcao)}` :
            fnMatch > 0 ? `Bate com sua função secundária · ${escapeHtml(vaga.funcao)}` :
            `Você não atua como ${escapeHtml(vaga.funcao)}`,
    pts: fnMatch === 0 ? 40 : fnMatch > 0 ? 25 : 0,
    max: 40,
    state: fnMatch === 0 ? 'ok' : fnMatch > 0 ? 'partial' : 'miss'
  });
  // Distância · mockado em São Paulo (todos no raio)
  items.push({
    icon:'map-pin', label:'Distância',
    detail:`Estabelecimento em São Paulo · dentro do seu raio de ${pro.raio||5}km`,
    pts:20, max:20, state:'ok'
  });
  // Score histórico
  const scorePts = pro.score ? Math.round((pro.score - 4) * 30) : 0;
  items.push({
    icon:'star', label:'Histórico de score',
    detail: pro.score ? `Sua média ${pro.score.toFixed(1)}★ em ${pro.turnos||0} turnos realizados` : 'Sem histórico ainda · 0 turnos',
    pts:scorePts, max:30,
    state: scorePts >= 20 ? 'ok' : scorePts >= 10 ? 'partial' : 'miss'
  });
  // Nível
  const niveis = {Iniciante:0, Confiável:3, Destaque:6, Elite:10};
  const nivelPts = niveis[pro.nivel] || 0;
  items.push({
    icon:'award', label:'Nível na trilha',
    detail:`Nível atual ${pro.nivel || 'Iniciante'}${pro.nivel === 'Elite' ? ' · topo da trilha' : ''}`,
    pts:nivelPts, max:10,
    state: nivelPts >= 6 ? 'ok' : nivelPts >= 3 ? 'partial' : 'miss'
  });
  // Preço (sempre OK na demo · valor da vaga >= preço hora do pro)
  items.push({
    icon:'dollar-sign', label:'Preço',
    detail:`Valor da vaga R$${vaga.valorHora || (vaga.valor / 5).toFixed(0)}/h compatível com seu mínimo R$${pro.precoHora||25}/h`,
    pts:0, max:0, state:'ok'  // Sem peso explícito · viabilidade binária
  });
  return items;
}

// Sprint C.1 · Calcula insight financeiro editorial · profissional ou contratante
// Compara período atual vs anterior + projeção até o fim do período
function calcFinInsight(turnos, periodo, role){
  const ranges = { 'dia':1, 'semana':7, 'quinzena':15, 'mes':30 };
  const days = ranges[periodo] || 30;
  const periodoMs = days * 86400000;
  const now = Date.now();
  // Período atual
  const atual = turnos.filter(t => (now - new Date(t.checkOut).getTime()) <= periodoMs);
  // Período anterior · mesmo intervalo, deslocado
  const ant = turnos.filter(t => {
    const d = now - new Date(t.checkOut).getTime();
    return d > periodoMs && d <= periodoMs * 2;
  });
  const valorFn = role === 'pro' ? (t => t.valor) : (t => totalEmp(t.valor));
  const totalAtual = atual.reduce((s,t) => s + valorFn(t), 0);
  const totalAnt = ant.reduce((s,t) => s + valorFn(t), 0);
  const delta = totalAnt > 0 ? ((totalAtual - totalAnt) / totalAnt) * 100 : null;
  // Projeção · ritmo médio diário × dias restantes
  const elapsedDays = Math.max(1, Math.min(days, days)); // assumindo período full
  const ritmoDiario = totalAtual / elapsedDays;
  const projecao = ritmoDiario * days;
  return { atual, ant, totalAtual, totalAnt, delta, projecao, ritmoDiario, periodo, days };
}

function genInsightCardHTML(insight, role){
  const { totalAtual, totalAnt, delta, projecao, periodo, days, atual } = insight;
  const periodoLabel = {dia:'hoje', semana:'essa semana', quinzena:'essa quinzena', mes:'esse mês'}[periodo] || 'esse mês';
  const periodoAntLabel = {dia:'ontem', semana:'semana passada', quinzena:'quinzena anterior', mes:'mês passado'}[periodo] || 'mês passado';
  const isPro = role === 'pro';
  const verbo = isPro ? 'Você ganhou' : 'Você gastou';
  const verboFut = isPro ? 'fecha em' : 'vai gastar';

  // Caso 1 · período sem dados
  if(atual.length === 0){
    return `
      <div class="insight-card">
        <div class="insight-icon"><i data-lucide="lightbulb"></i></div>
        <div class="insight-body">
          <div class="insight-eyebrow">insight do ${periodoLabel}</div>
          <div class="insight-h">Sem movimento ${periodoLabel} · ${isPro ? 'troque o filtro ou ajuste seu próximo turno no Feed' : 'troque o filtro ou abra uma vaga em Vagas'}.</div>
          <div class="insight-d">Quanto mais turnos no período, mais preciso fica seu painel de controle.</div>
        </div>
      </div>
    `;
  }

  // Caso 2 · sem dados de comparação (primeiro período)
  if(delta === null){
    return `
      <div class="insight-card">
        <div class="insight-icon"><i data-lucide="trending-up"></i></div>
        <div class="insight-body">
          <div class="insight-eyebrow">insight do ${periodoLabel}</div>
          <div class="insight-h">${verbo} <b>${fmtMoney(totalAtual)}</b> ${periodoLabel} · sem histórico anterior para comparar ainda.</div>
          <div class="insight-d">${isPro?'Seguindo esse ritmo':'Mantendo o ritmo atual'}, ${verboFut} cerca de <b style="color:var(--w);font-family:var(--F)">${fmtMoney(projecao)}</b> em ${days} dias completos.</div>
        </div>
      </div>
    `;
  }

  // Caso 3 · comparação plena
  const subiu = delta > 5;
  const caiu = delta < -5;
  const trendCls = caiu ? 'down' : '';
  const trendIcon = caiu ? 'trending-down' : 'trending-up';
  const sign = delta > 0 ? '+' : '';
  const deltaStr = `${sign}${delta.toFixed(1)}%`;

  let frase;
  if(isPro){
    if(subiu) frase = `Você cresceu <b>${deltaStr}</b> em faturamento vs ${periodoAntLabel}. Total no período: <b>${fmtMoney(totalAtual)}</b>.`;
    else if(caiu) frase = `Caiu <span class="neg">${deltaStr}</span> vs ${periodoAntLabel} · total ${fmtMoney(totalAtual)}. Que tal acelerar a candidatura no Feed?`;
    else frase = `Mantendo o ritmo · ${fmtMoney(totalAtual)} ${periodoLabel}, semelhante a ${periodoAntLabel}.`;
  } else {
    if(subiu) frase = `Você gastou <b>${deltaStr}</b> a mais que ${periodoAntLabel} · total ${fmtMoney(totalAtual)}. Operação aquecida.`;
    else if(caiu) frase = `Custo caiu <span class="neg">${deltaStr}</span> vs ${periodoAntLabel} · total ${fmtMoney(totalAtual)}. Operação mais enxuta esse período.`;
    else frase = `Custo estável · ${fmtMoney(totalAtual)} ${periodoLabel}, semelhante a ${periodoAntLabel}.`;
  }

  return `
    <div class="insight-card">
      <div class="insight-icon"><i data-lucide="${trendIcon}"></i></div>
      <div class="insight-body">
        <div class="insight-eyebrow">insight do ${periodoLabel} <span class="insight-trend ${trendCls}"><i data-lucide="${trendIcon}"></i> ${deltaStr}</span></div>
        <div class="insight-h">${frase}</div>
        <div class="insight-d">No ritmo atual, ${verboFut} cerca de <b style="color:var(--w);font-family:var(--F)">${fmtMoney(projecao)}</b> em ${days} dias completos · ticket médio do período <b style="color:var(--w);font-family:var(--F)">${fmtMoney(totalAtual / atual.length)}</b>.</div>
      </div>
    </div>
  `;
}

// Sprint C.3 · Duplicar vaga · pré-popula nova com dados desta + ajusta data
function duplicarVaga(vagaId){
  const u = Session.user();
  // Bloqueio de feedback gate
  const fbPend = pendingFeedbackTurno(u);
  if(fbPend){
    showToast('Avalie o último turno antes de abrir nova vaga', 'error');
    location.hash = '#/contratante/turno?id=' + fbPend.id;
    return;
  }
  const orig = db.vagas.find(v => v.id === vagaId);
  if(!orig) return;
  // Calcular nova data: próximo dia de semana mesmo horário
  const dataIniOrig = new Date(orig.dataIni);
  const dataFimOrig = new Date(orig.dataFim);
  const novaIni = new Date(dataIniOrig);
  novaIni.setDate(novaIni.getDate() + 7); // 1 semana à frente
  const novaFim = new Date(dataFimOrig);
  novaFim.setDate(novaFim.getDate() + 7);
  // Salva template em sessionStorage para o wizard usar
  sessionStorage.setItem('vagaTemplate', JSON.stringify({
    funcao: orig.funcao,
    dataIni: novaIni.toISOString(),
    dataFim: novaFim.toISOString(),
    valor: orig.valor,
    valorHora: orig.valorHora,
    vagas: orig.vagas,
    obs: orig.obs || ''
  }));
  showToast('Vaga duplicada · pré-preenchida com os dados anteriores', 'success');
  location.hash = '#/contratante/vagas/nova';
}

// Sprint C.3 · Sugestão de valor histórico baseada nas últimas N vagas da mesma função
function sugestaoValorHistorico(estabId, funcao){
  const recentes = db.vagas.filter(v => v.estabId === estabId && (v.funcao||'').toLowerCase() === (funcao||'').toLowerCase())
    .sort((a,b) => new Date(b.dataIni) - new Date(a.dataIni))
    .slice(0,5);
  if(recentes.length < 2) return null;
  const totalValores = recentes.reduce((s,v) => s+(v.valor||0), 0);
  const totalHoras = recentes.reduce((s,v) => s + ((new Date(v.dataFim)-new Date(v.dataIni))/36e5), 0);
  return {
    count: recentes.length,
    valorMedio: totalValores / recentes.length,
    horaMedia: totalHoras > 0 ? totalValores / totalHoras : 0,
    funcao: funcao
  };
}

  const totalSteps = 3;
  const updateUI = () => {
    document.querySelectorAll('.wiz-step').forEach(el => {
      const s = parseInt(el.dataset.step,10);
      el.classList.toggle('active', s === step);
      el.classList.toggle('done', s < step);
    });
    document.querySelectorAll('.wiz-pane').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.pane,10) === step);
    });
    document.getElementById('wizBack').style.display = step > 1 ? 'inline-flex' : 'none';
    document.getElementById('wizNext').style.display = step < totalSteps ? 'inline-flex' : 'none';
    document.getElementById('wizSubmit').style.display = step === totalSteps ? 'inline-flex' : 'none';
    if(step === 3) renderWizSummary();
  };
  const renderWizSummary = () => {
    const fn = document.getElementById('f-funcao').value;
    const ini = document.getElementById('f-ini').value;
    const fim = document.getElementById('f-fim').value;
    const vh = document.getElementById('f-valorHora').value;
    const n = document.getElementById('f-vagas').value;

      <div class="wiz-summary-h">Resumo da vaga</div>
      <div class="wiz-summary-row"><span>Função</span><b>${escapeHtml(fn)}</b></div>
      <div class="wiz-summary-row"><span>Início</span><b>${ini.replace('T',' às ')}</b></div>
      <div class="wiz-summary-row"><span>Fim</span><b>${fim.replace('T',' às ')}</b></div>
      <div class="wiz-summary-row"><span>Valor/hora</span><b>R$ ${vh}</b></div>
      <div class="wiz-summary-row"><span>Posições</span><b>${n}</b></div>
    `;
  };
  const validate = (s) => {
    if(s === 1){
      const ini = document.getElementById('f-ini').value;
      const fim = document.getElementById('f-fim').value;
      if(!ini || !fim){ showToast('Preencha as datas de início e fim','error'); return false; }
      if(new Date(fim) <= new Date(ini)){ showToast('Fim do turno deve ser depois do início','error'); return false; }
    }
    if(s === 2){
      const vh = parseFloat(document.getElementById('f-valorHora').value);
      const n = parseInt(document.getElementById('f-vagas').value);
      if(!vh || vh < 20){ showToast('Valor mínimo: R$20/hora','error'); return false; }
      if(!n || n < 1){ showToast('Mínimo 1 posição','error'); return false; }
    }
    return true;
  };
  document.getElementById('wizNext').addEventListener('click', () => {
    if(!validate(step)) return;
    if(step < totalSteps){ step++; updateUI(); }
  });
  document.getElementById('wizBack').addEventListener('click', () => {
    if(step > 1){ step--; updateUI(); }
  });
  updateUI();
}

// Sprint C.3 · alias usado pela sugestão de valor histórico
window.recalcTotal = updateVagaCalc;
function updateVagaCalc(){
  const iniEl = document.getElementById('f-ini');
  const fimEl = document.getElementById('f-fim');
  const vhEl = document.getElementById('f-valorHora');
  const nEl = document.getElementById('f-vagas');
  const out = document.getElementById('calcInfo');
  if(!iniEl || !fimEl || !vhEl || !nEl || !out) return;
  const ini = new Date(iniEl.value);
  const fim = new Date(fimEl.value);
  const vh = parseFloat(vhEl.value)||0;
  const n = parseInt(nEl.value)||1;
  if(isNaN(ini)||isNaN(fim)||fim<=ini){
    out.textContent = 'Defina datas válidas';
    return;
  }
  const horas = (fim-ini)/36e5;
  const valorProfTotal = horas*vh*n;
  const taxa = taxaTurni(valorProfTotal);
  const totalAPagar = totalEmp(valorProfTotal);
  const preauth = totalAPagar*1.25;
  out.innerHTML = `${horas.toFixed(1)}h · ${n} posiç${n>1?'ões':'ão'} ·
    Profissional recebe <b style="color:var(--lime)">${valorProfTotal.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</b> ·
    Taxa TURN<span class="di">I</span><span class="de">.</span> 15% <b>${taxa.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</b> ·
    <b style="color:var(--orange)">Total a pagar ${totalAPagar.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</b> ·
    Pré-aut ${preauth.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}`;
}

function createVaga(e){
  e.preventDefault();
  const u = Session.user();
  const funcao = document.getElementById('f-funcao').value;
  const dataIni = document.getElementById('f-ini').value;
  const dataFim = document.getElementById('f-fim').value;
  const valorHora = parseFloat(document.getElementById('f-valorHora').value);
  const vagas = parseInt(document.getElementById('f-vagas').value);
  const obs = document.getElementById('f-obs').value.trim();

  const ini = new Date(dataIni);
  const fim = new Date(dataFim);
  if(fim <= ini){ showToast('Data de fim antes do início', 'error'); return; }

  const horas = (fim - ini) / 36e5;
  const valor = horas * valorHora;

  const newVaga = {
    id: 'v-' + Date.now(),
    estabId: u.id,
    funcao, dataIni, dataFim,
    valor: Math.round(valor*100)/100,
    valorHora,
    vagas,
    candidatos: [],
    status: 'aberta',
    obs: obs || null,
    criadoEm: new Date().toISOString()
  };
  db.vagas.unshift(newVaga);
  DB.save(db);
  showToast('Vaga publicada · profissionais já podem candidatar');
  // Match card · vaga publicada · TURNI está procurando
  fireMatchEvent('vaga', { vaga: newVaga, emp: u });
  location.hash = '#/contratante/vaga?id=' + newVaga.id;
}

function cancelVaga(vagaId){
  if(!confirm('Cancelar esta vaga? Profissionais candidatos serão notificados.')) return;
  const v = db.vagas.find(x => x.id === vagaId);
  if(!v) return;
  v.status = 'cancelada';
  DB.save(db);
  showToast('Vaga cancelada');
  route();
}

function approveCandidate(vagaId, proId){
  const v = db.vagas.find(x => x.id === vagaId);
  const p = db.users.find(x => x.id === proId);
  if(!v || !p) return;
  if(!v.candidatos.includes(proId)) v.candidatos.push(proId);
  // Cria turno em estado "confirmado"
  const t = {
    id: 't-' + Date.now() + '-' + proId,
    vagaId, proId, estabId: v.estabId,
    status: 'confirmado',
    checkIn: null, checkOut: null,
    valor: v.valor / Math.max(1, v.vagas), // divide entre posições se for múltipla
    criadoEm: new Date().toISOString()
  };
  db.turnos.push(t);
  v.vagas -= 1;
  if(v.vagas <= 0){ v.status = 'fechada'; v.vagas = 0; }
  DB.save(db);
  showToast(`${p.nome.split(' ')[0]} aprovado · turno confirmado`);
  // Match card · match estabelecido · cards face-to-face
  const emp = db.users.find(x => x.id === v.estabId);
  fireMatchEvent('match', { turno: t, vaga: v, emp, pro: p });
  location.hash = '#/contratante/turno?id=' + t.id;
}

// ── Turnos ──
// Card compacto para o kanban · contextual conforme o status
function renderEmpTurnoKanbanCard(t){
  const pro = db.users.find(x => x.id === t.proId);
  const vaga = db.vagas.find(v => v.id === t.vagaId);
  const hasAction = (t.status === 'confirmado' && t._pendingCheckInPin)
                 || (t.status === 'ativo' && t._pendingCheckOutPin);

  let extra = '';
  if(t.status === 'ativo'){
    if(t.checkIn){
      const ms = Date.now() - new Date(t.checkIn).getTime();
      const h = Math.floor(ms/36e5);
      const m = Math.floor((ms%36e5)/6e4);
      extra += `<div class="kanban-card-meta-row"><i data-lucide="clock"></i>em curso · ${h}h${String(m).padStart(2,'0')}</div>`;
    }
    if(t._pendingCheckOutPin){
      extra += `<div class="kanban-card-meta-row alert"><i data-lucide="alert-circle"></i>aguardando validação check-out</div>`;
    }
  } else if(t.status === 'confirmado'){
    if(vaga) extra += `<div class="kanban-card-meta-row"><i data-lucide="calendar-check"></i>${fmtDateTime(vaga.dataIni)}</div>`;
    if(t._pendingCheckInPin){
      extra += `<div class="kanban-card-meta-row warn"><i data-lucide="map-pin"></i>profissional chegou · validar PIN</div>`;
    }
  } else if(t.status === 'finalizado'){
    if(t.checkOut) extra += `<div class="kanban-card-meta-row"><i data-lucide="check"></i>${fmtDateTime(t.checkOut)}</div>`;
    extra += `<div class="kanban-card-meta-row"><i data-lucide="check-circle"></i>pago via Pagar.me</div>`;
  }

  return `
    <div class="kanban-card ${hasAction?'has-action':''}" onclick="location.hash='#/contratante/turno?id=${t.id}'">
      <div class="kanban-card-top">
        <div class="kanban-card-avatar">${avatarHTML(pro)}</div>
        <div class="kanban-card-name">${escapeHtml(pro?.nome || '—')}</div>
      </div>
      <div class="kanban-card-meta">
        <div class="kanban-card-meta-row"><i data-lucide="briefcase"></i>${escapeHtml(vaga?.funcao || t.vagaId)}</div>
        ${extra}
      </div>
      <div class="kanban-card-foot">
        <span class="kanban-card-value">${fmtMoney(t.valor)}</span>
        <span class="kanban-card-arrow">detalhe <i data-lucide="arrow-right"></i></span>
      </div>
    </div>
  `;
}

  openModal(`
    <h3>VALIDAR CHECK-IN</h3>
    <div class="modal-meta">${escapeHtml(db.users.find(u=>u.id===t.proId)?.nome||'')} chegou e gerou um PIN</div>
    <div class="pin-info">
      <i data-lucide="map-pin" style="width:14px;height:14px;color:var(--lime);vertical-align:middle"></i>

      Digite o PIN que o profissional <b>está mostrando na tela dele</b> para iniciar o turno e o cronômetro bilateral.
      <div class="pin-clue">⚡ DEMO · PIN do profissional é <b style="color:var(--orange)">${pin}</b></div>
    </div>
    <div class="pin-input">
      ${[0,1,2,3].map(i => `<input type="text" maxlength="1" class="pin-digit" id="pin${i}" inputmode="numeric" pattern="[0-9]*" oninput="advancePin(${i},'in')">`).join('')}

function advancePin(i, kind){
  const el = document.getElementById('pin'+i);
  if(!el) return;
  el.value = el.value.replace(/[^0-9]/g,'');
  if(el.value) el.classList.add('filled'); else el.classList.remove('filled');
  if(el.value && i < 3) document.getElementById('pin'+(i+1))?.focus();
}

function validateCheckIn(turnoId){
  const t = db.turnos.find(x => x.id === turnoId);
  if(!t) return;
  const typed = [0,1,2,3].map(i => document.getElementById('pin'+i)?.value || '').join('');
  if(typed !== t._pendingCheckInPin){
    showToast('PIN incorreto', 'error');
    return;
  }
  t.status = 'ativo';
  t.checkIn = new Date().toISOString();
  delete t._pendingCheckInPin;
  DB.save(db);
  closeModal();
  showToast('Check-in validado · turno iniciado');
  fireMatchEvent('checkin-ok', { turno: t });
  route();
}

// Simulação single-tab · contratante simula que profissional encerrou e gerou PIN
function simulateProCheckOut(turnoId){
  const t = db.turnos.find(x => x.id === turnoId);
  if(!t) return;
  const pin = Math.floor(1000 + Math.random()*9000).toString();
  t._pendingCheckOutPin = pin;
  DB.save(db);
  showToast('Profissional encerrou · PIN gerado: ' + pin);
  route();
}

// Contratante valida o PIN gerado pelo profissional · libera o pagamento
function validateCheckOut(turnoId){
  const t = db.turnos.find(x => x.id === turnoId);
  if(!t || !t._pendingCheckOutPin) return;
  const typed = [0,1,2,3].map(i => document.getElementById('pin'+i)?.value || '').join('');
  if(typed !== t._pendingCheckOutPin){
    showToast('PIN incorreto · confira com o profissional', 'error');
    return;
  }
  t.status = 'finalizado';
  t.checkOut = new Date().toISOString();
  delete t._pendingCheckOutPin;
  delete t._pendingCheckInPin;
  // Score do profissional bump
  const pro = db.users.find(u => u.id === t.proId);
  if(pro){
    pro.turnos = (pro.turnos||0) + 1;
    if(pro.score) pro.score = Math.min(5.0, Math.round((pro.score*0.9 + 5*0.1)*10)/10);
  }
  DB.save(db);
  if(window._cronoInterval) clearInterval(window._cronoInterval);
  showToast(`Pago ${fmtMoney(totalEmp(t.valor))} · Pix de ${fmtMoney(t.valor)} a caminho`);
  fireMatchEvent('checkout-ok', { turno: t });
  route();
}

// Contratante discorda do valor → abre ocorrência mediada pela Turni
function disputeCheckOut(turnoId){
  if(!confirm('Discordar do valor abre uma ocorrência com a TURN<span class="di">I</span><span class="de">.</span> mediar (até 30 min). Continuar?')) return;
  const t = db.turnos.find(x => x.id === turnoId);
  if(!t) return;
  delete t._pendingCheckOutPin;
  DB.save(db);
  showToast('Ocorrência aberta · TURN<span class="di">I</span><span class="de">.</span> vai mediar em até 30 min');
  route();
}

function cancelTurno(id){
  if(!confirm('Cancelar este turno? Profissional será notificado.')) return;
  db.turnos = db.turnos.filter(t => t.id !== id);
  DB.save(db);
  showToast('Turno cancelado');

// ── Escala semanal ──
function renderEmpEscala(){
  const u = Session.user();
  const today = new Date(); today.setHours(0,0,0,0);
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - today.getDay()); // domingo
  const days = [];
  for(let i = 0; i < 7; i++){
    const d = new Date(weekStart); d.setDate(weekStart.getDate() + i);
    days.push(d);
  }

  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const minhasVagas = db.vagas.filter(v => v.estabId === u.id);
  const meusTurnos = db.turnos.filter(t => t.estabId === u.id);

  function slotsOfDay(date){
    const slots = [];
    minhasVagas.forEach(v => {
      const di = new Date(v.dataIni);
      if(di.toDateString() === date.toDateString()){
        slots.push({type:'vaga', v, time:`${String(di.getHours()).padStart(2,'0')}:${String(di.getMinutes()).padStart(2,'0')}`});
      }
    });
    meusTurnos.forEach(t => {
      if(t.checkIn){
        const di = new Date(t.checkIn);
        if(di.toDateString() === date.toDateString()){
          slots.push({type:'turno', t, time:`${String(di.getHours()).padStart(2,'0')}:${String(di.getMinutes()).padStart(2,'0')}`});
        }
      }
    });
    return slots.sort((a,b) => a.time.localeCompare(b.time));
  }

  const content = `
    <div class="main-head">
      <div>
        <h1 class="main-h">Escala da semana</h1>
        <div class="main-d">${weekStart.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})} – ${days[6].toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}</div>
      </div>
      <div class="page-actions">
        <a class="btn-primary" href="#/contratante/vagas/nova"><i data-lucide="plus"></i> Nova vaga</a>
      </div>
    </div>

    <div class="escala-grid">
      ${days.map((d, idx) => {
        const slots = slotsOfDay(d);
        const isToday = d.toDateString() === today.toDateString();
        const isWeekend = idx === 0 || idx === 6;
        return `
          <div class="escala-day ${isToday?'today':''} ${isWeekend?'weekend':''}">
            <div class="escala-d-h">
              ${dias[idx]}
              <b>${d.getDate()}</b>
            </div>
            ${slots.length === 0 ? `<div style="text-align:center;font-family:var(--M);font-size:9px;color:#444;letter-spacing:1px;margin-top:30px">—</div>` :
              slots.map(s => {
                if(s.type === 'vaga'){
                  return `<div class="escala-slot ${s.v.status==='fechada'?'fechada':''}" onclick="location.hash='#/contratante/vaga?id=${s.v.id}'">
                    <div class="h">${s.time}</div>
                    <div class="f">${escapeHtml(s.v.funcao)}${s.v.candidatos.length?` · ${s.v.candidatos.length} cand`:''}</div>
                  </div>`;
                } else {
                  const pro = db.users.find(u => u.id === s.t.proId);
                  return `<div class="escala-slot ativo" onclick="location.hash='#/contratante/turno?id=${s.t.id}'">
                    <div class="h">${s.time}</div>
                    <div class="f">${escapeHtml((pro?.nome||'').split(' ')[0])} · em curso</div>
                  </div>`;
                }
              }).join('')
            }
          </div>
        `;
      }).join('')}
    </div>

    <div style="display:flex;gap:18px;margin-top:24px;font-family:var(--M);font-size:10px;color:#888;letter-spacing:1.5px;flex-wrap:wrap">
      <span><span style="display:inline-block;width:12px;height:12px;background:var(--orange);margin-right:6px;vertical-align:middle"></span>Vaga aberta</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:var(--fhp);margin-right:6px;vertical-align:middle"></span>Vaga fechada</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:var(--blue);margin-right:6px;vertical-align:middle"></span>Turno em curso</span>
    </div>
  `;

  document.getElementById('app').innerHTML = shellHTML(u, content, getNavEmp(u, 'escala'));
  refreshIcons();
}

function renderEmpEquipe(){
  const u = Session.user();
