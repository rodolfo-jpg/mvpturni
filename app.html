// Estado em memória do cadastro completo · evita salvar no DB a cada keystroke
const _ccState = {foto:null, raio:null, preco:null, pix:null, cnpj:null, funcao2:null, funcao3:null};

function ccUpdateFoto(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    _ccState.foto = e.target.result;
    document.getElementById('ccFotoPreview').innerHTML = `<img src="${e.target.result}">`;
    document.getElementById('cc-1').classList.add('filled');
    ccUpdateProgress();
  };
  reader.readAsDataURL(file);
}
function ccUpdateRaio(v){
  _ccState.raio = +v;
  document.getElementById('ccRaioVal').textContent = v + ' km';
  document.getElementById('cc-2').classList.add('filled');
  ccUpdateProgress();
}
function ccUpdatePreco(v){
  _ccState.preco = +v;
  document.getElementById('ccPrecoVal').textContent = 'R$ ' + v + '/h';
  document.getElementById('cc-3').classList.add('filled');
  ccUpdateProgress();
}
function ccUpdatePix(v){
  _ccState.pix = (v||'').trim();
  document.getElementById('cc-4').classList.toggle('filled', _ccState.pix.length >= 8);
  ccUpdateProgress();
}
function ccUpdateCnpj(input){
  let v = (input.value||'').replace(/\D/g,'');
  if(v.length > 14) v = v.slice(0,14);
  if(v.length >= 12) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{0,2}).*/, '$1.$2.$3/$4-$5');
  else if(v.length >= 8) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{0,4}).*/, '$1.$2.$3/$4');
  else if(v.length >= 5) v = v.replace(/^(\d{2})(\d{3})(\d{0,3}).*/, '$1.$2.$3');
  else if(v.length >= 2) v = v.replace(/^(\d{2})(\d{0,3}).*/, '$1.$2');
  input.value = v;
  _ccState.cnpj = v;
  document.getElementById('cc-5').classList.toggle('filled', v.length >= 14);
  ccUpdateProgress();
}
function ccToggleFuncao(f){
  if(_ccState.funcao2 === f){ _ccState.funcao2 = null; }
  else if(_ccState.funcao3 === f){ _ccState.funcao3 = null; }
  else if(!_ccState.funcao2){ _ccState.funcao2 = f; }
  else if(!_ccState.funcao3){ _ccState.funcao3 = f; }
  else { showToast('Máximo 2 funções extras', 'error'); return; }
  // Re-render dos pills
  document.querySelectorAll('#ccFuncoes .cc-pill').forEach(p => {
    const txt = p.textContent.trim();
    p.classList.toggle('active', _ccState.funcao2 === txt || _ccState.funcao3 === txt);
  });
  document.getElementById('cc-6').classList.toggle('filled', !!(_ccState.funcao2 || _ccState.funcao3));
  ccUpdateProgress();
}
function ccUpdateProgress(){
  // 5 obrigatórios (foto, raio, preço, pix, cnpj) + 1 opcional (funções)
  const obrigatorios = ['cc-1','cc-2','cc-3','cc-4','cc-5'];
  const filled = obrigatorios.filter(id => document.getElementById(id)?.classList.contains('filled')).length;
  const pct = (filled / 5) * 100;
  const fillEl = document.getElementById('ccFill');
  if(fillEl) fillEl.style.width = pct + '%';
  const submit = document.getElementById('ccSubmit');
  if(submit) submit.disabled = filled < 5;
}
function ccFinish(){
  const u = Session.user();
  if(!u) return;
  if(_ccState.foto) u.foto = _ccState.foto;
  if(_ccState.raio != null) u.raio = _ccState.raio;
  if(_ccState.preco != null) u.precoHora = _ccState.preco;
  if(_ccState.pix) u.chavePix = _ccState.pix;
  if(_ccState.cnpj) u.cnpj = _ccState.cnpj;
  u.mei = !!_ccState.cnpj;
  if(_ccState.funcao2) u.funcao2 = _ccState.funcao2;
  if(_ccState.funcao3) u.funcao3 = _ccState.funcao3;
  u.cadastroCompleto = true;
  DB.save(db);
  showToast('Perfil completo · você está no feed', 'success');
  // Reset state
  Object.keys(_ccState).forEach(k => _ccState[k] = null);
  setTimeout(() => location.hash = '#/profissional', 600);
}

function ccEUpdateBloco(n){
  const checks = {
    1: () => (document.getElementById('ccLogradouro')?.value.trim().length >= 5 && document.getElementById('ccBairro')?.value.trim().length >= 2),

    4: () => (document.getElementById('ccChavePag')?.value.trim().length >= 8)
  };
  for(let i=1; i<=4; i++){
    const ok = checks[i]();
    const el = document.getElementById('cc-'+i);
    if(el) el.classList.toggle('filled', !!ok);
  }
  const filled = [1,2,3,4].filter(i => checks[i]()).length;
  const pct = (filled / 4) * 100;
  const fillEl = document.getElementById('ccFill');
  if(fillEl) fillEl.style.width = pct + '%';
  const submit = document.getElementById('ccSubmit');
  if(submit) submit.disabled = filled < 4;
}

// Sprint C.2 · Modal de breakdown do match · transparência do algoritmo
function showMatchBreakdown(vagaId){
  const u = Session.user();
  const v = db.vagas.find(x => x.id === vagaId);
  if(!u || !v) return;
  const emp = db.users.find(x => x.id === v.estabId);
  const score = calcMatch(u, v);
  const breakdown = calcMatchBreakdown(u, v);
  const scoreCls = score >= 80 ? '' : score >= 60 ? 'mid' : 'low';

  let bg = document.getElementById('mbModalBg');
  if(!bg){
    bg = document.createElement('div');
    bg.id = 'mbModalBg';
    bg.className = 'mb-modal-bg';
    bg.addEventListener('click', e => { if(e.target === bg) closeMatchBreakdown(); });
    document.body.appendChild(bg);
  }
  bg.innerHTML = `
    <div class="mb-modal" role="dialog" aria-label="Breakdown do match">
      <div class="mb-head">
        <div class="mb-eyebrow">por que esse match?</div>
        <div class="mb-score ${scoreCls}">${score}<span class="mb-score-pct">%</span></div>
        <div class="mb-score-l">com ${escapeHtml(v.funcao)} em ${escapeHtml(emp?.estabelecimento||'—')}</div>
      </div>
      <div class="mb-list">
        ${breakdown.filter(b => b.max > 0 || b.state !== 'ok').map(b => `
          <div class="mb-item">
            <div class="mb-item-icon ${b.state}"><i data-lucide="${b.state === 'ok' ? 'check' : b.state === 'partial' ? 'minus' : 'x'}"></i></div>
            <div class="mb-item-info">
              <div class="mb-item-l">${escapeHtml(b.label)}</div>
              <div class="mb-item-d">${b.detail}</div>
            </div>
            <div class="mb-item-pts ${b.state}">${b.pts > 0 ? '+'+b.pts : '—'}${b.max > 0 ? '<span style="opacity:.5">/'+b.max+'</span>' : ''}</div>
          </div>
        `).join('')}
        <div class="mb-item" style="background:transparent;border:1px dashed var(--b1)">
          <div class="mb-item-icon" style="background:transparent;color:var(--t-tertiary)"><i data-lucide="info"></i></div>
          <div class="mb-item-info">
            <div class="mb-item-l" style="color:var(--t-secondary)">Como subir o match</div>
            <div class="mb-item-d">Adicione funções extras no perfil · suba de nível com turnos finalizados sem ocorrência · mantenha sua média acima de 4.5★.</div>
          </div>
        </div>
      </div>
      <div class="mb-foot">
        <button class="mb-close" onclick="closeMatchBreakdown()">Entendi</button>
        <a href="#/profissional/vaga?id=${v.id}" onclick="closeMatchBreakdown()" style="font-family:var(--M);font-size:11px;color:var(--lime);letter-spacing:1.5px;text-transform:uppercase;text-decoration:underline">Ver vaga completa →</a>
      </div>
    </div>
  `;
  bg.classList.add('show');
  if(window.lucide) lucide.createIcons();
}

}

function renderProFeed(params){
  const u = Session.user();
  if(!u.ativo){ location.hash='#/profissional'; return; }
  const filter = params.f || 'todas';

  // Pool: vagas abertas com vaga.vagas > 0
  const pool = db.vagas.filter(v => v.status === 'aberta' && v.vagas > 0);
  const enriched = pool.map(v => ({v, match: calcMatch(u, v), candidatou: v.candidatos.includes(u.id)}));

  // Função primária + extras (funcao2, funcao3) entram no filtro "minha função"
  const myFuncoes = [u.funcao, u.funcao2, u.funcao3].filter(Boolean).map(f => f.toLowerCase());
  const matchesFuncao = vagaFuncao => myFuncoes.includes((vagaFuncao||'').toLowerCase());
  let filtered = enriched;
  if(filter === 'minha-funcao') filtered = filtered.filter(x => matchesFuncao(x.v.funcao));
  else if(filter === 'alto-match') filtered = filtered.filter(x => x.match >= 80);
  else if(filter === 'candidatadas') filtered = filtered.filter(x => x.candidatou);
  filtered.sort((a,b) => b.match - a.match);

  const counts = {
    todas: enriched.length,
    'minha-funcao': enriched.filter(x => matchesFuncao(x.v.funcao)).length,
    'alto-match': enriched.filter(x => x.match >= 80).length,
    'candidatadas': enriched.filter(x => x.candidatou).length
  };

  const content = `
    <div class="main-head">
      <div>
        <h1 class="main-h">Feed de vagas</h1>
        <div class="main-d">${enriched.length} vagas abertas em São Paulo · ordenado por match com seu perfil</div>
      </div>
    </div>

      <a class="role-tab ${filter==='todas'?'active':''}" href="#/profissional/feed?f=todas">Todas <span class="badge">${counts.todas}</span></a>
      <a class="role-tab ${filter==='minha-funcao'?'active':''}" href="#/profissional/feed?f=minha-funcao">Minha função <span class="badge">${counts['minha-funcao']}</span></a>
      <a class="role-tab ${filter==='alto-match'?'active':''}" href="#/profissional/feed?f=alto-match">Alto match (80%+) <span class="badge">${counts['alto-match']}</span></a>
      <a class="role-tab ${filter==='candidatadas'?'active':''}" href="#/profissional/feed?f=candidatadas">Candidatadas <span class="badge">${counts['candidatadas']}</span></a>
    </div>

    <div class="section">
      <div class="section-body zlist">
        ${filtered.length === 0 ? `
          <div class="empty"><i data-lucide="compass"></i><p>Nenhuma vaga neste filtro</p></div>

  document.getElementById('app').innerHTML = shellHTML(u, content, getNavPro(u, 'feed'));
  refreshIcons();
}

function candidatarVaga(vagaId){
  const u = Session.user();
  // Sprint A.3 · feedback gate · bloqueia candidatura se há turno por avaliar
  const fbPend = pendingFeedbackTurno(u);
  if(fbPend){
    const emp = db.users.find(x => x.id === fbPend.estabId);
    showToast('Avalie ' + (emp?.estabelecimento||'a casa').split(' ')[0] + ' antes de candidatar-se a outra vaga', 'error');
    location.hash = '#/profissional/turno?id=' + fbPend.id;
    return;
  }
  const v = db.vagas.find(x => x.id === vagaId);
  if(!v) return;
  if(!v.candidatos.includes(u.id)) v.candidatos.push(u.id);
  DB.save(db);
  showToast('Candidatura enviada · contratante recebeu seu perfil');
  // Match card · candidatura enviada (lado profissional vê)
  const emp = db.users.find(x => x.id === v.estabId);
  fireMatchEvent('candidatura', { vaga: v, emp, pro: u });
  route();
}
function cancelarCandidatura(vagaId){
  if(!confirm('Cancelar sua candidatura?')) return;
  const u = Session.user();
  const v = db.vagas.find(x => x.id === vagaId);
  if(!v) return;
  v.candidatos = v.candidatos.filter(id => id !== u.id);
  DB.save(db);
  showToast('Candidatura cancelada');
  route();
}

function renderProFinanceiro(params){
  const u = Session.user();
  if(!u.ativo){ location.hash='#/profissional'; return; }
  const periodo = (params && params.p) || 'mes';

  const turnosFin = db.turnos.filter(t => t.proId === u.id && t.status === 'finalizado' && t.checkOut)
    .sort((a,b) => new Date(b.checkOut) - new Date(a.checkOut));

  const now = Date.now();
  const ranges = {
    'dia': 1, 'semana': 7, 'quinzena': 15, 'mes': 30
  };
  const days = ranges[periodo] || 30;
  const periodoMs = days * 86400000;
  const filtered = turnosFin.filter(t => (now - new Date(t.checkOut).getTime()) <= periodoMs);

  const total = filtered.reduce((s,t) => s+t.valor, 0);
  const horas = filtered.reduce((s,t) => {
    const v = db.vagas.find(x => x.id === t.vagaId);
    if(!v) return s;
    return s + ((new Date(v.dataFim) - new Date(v.dataIni))/36e5);
  }, 0);
  const valorHora = horas > 0 ? total / horas : 0;
  const ticket = filtered.length > 0 ? total / filtered.length : 0;

  // Sprint C.1 · Insight editorial
  const insight = calcFinInsight(turnosFin, periodo, 'pro');

  const content = `
    <!-- Print header · só aparece quando window.print() · cabeçalho institucional -->
    <div class="print-header">
      <div class="print-header-logo">TURN<span class="di" style="color:#00A868">I</span><span class="de" style="-webkit-text-stroke:2px #00A868;color:transparent">.</span></div>
      <div class="print-header-meta">
        EXTRATO ${periodo.toUpperCase()} · ${escapeHtml(u.nome||'')}<br>
        ${escapeHtml(u.cnpj||'CNPJ a confirmar')} · ${new Date().toLocaleDateString('pt-BR')}
      </div>
    </div>

    <div class="main-head">
      <div>
        <h1 class="main-h">Financeiro</h1>
        <div class="main-d">Painel de controle · acompanhe seu faturamento por período</div>
      </div>
    </div>

    ${genInsightCardHTML(insight, 'pro')}

    <div style="display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;align-items:center">
      <a class="role-tab ${periodo==='dia'?'active':''}" href="#/profissional/financeiro?p=dia">Hoje</a>
      <a class="role-tab ${periodo==='semana'?'active':''}" href="#/profissional/financeiro?p=semana">Semana</a>
      <a class="role-tab ${periodo==='quinzena'?'active':''}" href="#/profissional/financeiro?p=quinzena">Quinzena</a>
      <a class="role-tab ${periodo==='mes'?'active':''}" href="#/profissional/financeiro?p=mes">Mês</a>
      <button class="pdf-export-btn" onclick="exportFinPDF()"><i data-lucide="download"></i> Exportar PDF · NF</button>
    </div>

    <div class="kpis">
      <div class="kpi lime" style="grid-column:span 2">
        <div class="kpi-l"><i data-lucide="wallet"></i> Faturamento líquido · ${periodo}</div>
        <div class="kpi-v" style="font-size:42px">${fmtMoney(total)}</div>
        <div class="kpi-d">valor integral · sem desconto · Pix recebido</div>
      </div>
      <div class="kpi fhp">
        <div class="kpi-l"><i data-lucide="check-circle"></i> Turnos no período</div>
        <div class="kpi-v">${filtered.length}</div>
        <div class="kpi-d">${horas.toFixed(0)}h trabalhadas</div>
      </div>
      <div class="kpi orange">
        <div class="kpi-l"><i data-lucide="trending-up"></i> Valor médio/hora</div>
        <div class="kpi-v">${fmtMoney(valorHora)}</div>
        <div class="kpi-d">ticket médio ${fmtMoney(ticket)}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-h">
        <h2><i data-lucide="receipt"></i> Recebimentos do período</h2>
        <span class="meta">${filtered.length} pagamento${filtered.length!==1?'s':''} · Pagar.me</span>
      </div>
      <div class="section-body hist-list">
        ${filtered.length === 0 ? `<div class="empty"><i data-lucide="wallet"></i><p>Sem recebimentos no período · troque o filtro acima ou aceite seu próximo turno no Feed</p></div>` :
          filtered.map(t => {
            const vaga = db.vagas.find(v => v.id === t.vagaId);
            const emp = db.users.find(x => x.id === t.estabId);
            const date = new Date(t.checkOut);
            return `
              <div class="hist-row" onclick="location.hash='#/profissional/turno?id=${t.id}'">
                <div class="hist-data">
                  <div class="hist-data-d">${date.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}</div>
                  <div class="hist-data-y">${date.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
                </div>
                <div class="hist-info">
                  <div class="hist-fn">${escapeHtml(vaga?.funcao||'—')} · <span class="hist-emp">${escapeHtml(emp?.estabelecimento||'—')}</span></div>
                  <div class="hist-fb"><i data-lucide="zap" style="color:var(--lime)"></i> Pix recebido em até 15 min</div>
                </div>
                <div class="hist-valor pos">+${fmtMoney(t.valor)}</div>
              </div>
            `;
          }).join('')
        }
      </div>
    </div>

    <div class="print-footer">
      Documento gerado pela plataforma TURNI · ${new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'})} · Para fins de NF MEI · pagamentos comprovados via Pagar.me · split automático CNPJ↔CNPJ
    </div>
  `;

  document.getElementById('app').innerHTML = shellHTML(u, content, getNavPro(u, 'financeiro'));
  refreshIcons();
}

function proCheckIn(turnoId){
  const t = db.turnos.find(x => x.id === turnoId);
  if(!t) return;
  const pin = Math.floor(1000 + Math.random()*9000).toString();
  t._pendingCheckInPin = pin;
  DB.save(db);
  showToast('Check-in iniciado · mostre o PIN ao contratante');
  fireMatchEvent('checkin-gen', { turno: t });
  route();
}

// Profissional encerra o turno e gera o PIN de check-out · contratante valida para liberar o pagamento
function proRequestCheckOut(turnoId){
  const t = db.turnos.find(x => x.id === turnoId);
  if(!t) return;
  if(!confirm('Encerrar este turno? Um PIN de check-out será gerado para o contratante validar e liberar o pagamento.')) return;
  const pin = Math.floor(1000 + Math.random()*9000).toString();
  t._pendingCheckOutPin = pin;
  DB.save(db);
  showToast('Check-out solicitado · mostre o PIN ao contratante');
  fireMatchEvent('checkout-gen', { turno: t });
  route();
}

// Profissional cancela a solicitação antes do contratante validar
function proCancelCheckOutRequest(turnoId){
  if(!confirm('Cancelar a solicitação de check-out? O turno volta a ficar em curso.')) return;
  const t = db.turnos.find(x => x.id === turnoId);
  if(!t) return;
  delete t._pendingCheckOutPin;
  DB.save(db);
  showToast('Solicitação cancelada');
  route();
}

function proCancelarTurno(id){
  if(!confirm('Cancelar este turno? Pode impactar seu score.')) return;
  db.turnos = db.turnos.filter(t => t.id !== id);
  DB.save(db);
  showToast('Turno cancelado');
  location.hash = '#/profissional/turnos';
}

// ── Roster · Carteira do profissional ──
function renderProRoster(){
  const u = Session.user();
  if(!u.ativo){ location.hash='#/profissional'; return; }
  const meusTurnos = db.turnos.filter(t => t.proId === u.id);
  const finalizados = meusTurnos.filter(t => t.status === 'finalizado').sort((a,b) => new Date(b.checkOut||0) - new Date(a.checkOut||0));
  const ativos = meusTurnos.filter(t => t.status === 'ativo' || t.status === 'confirmado');

  const totalRecebido = finalizados.reduce((s,t)=>s+t.valor,0);
  const aReceber = ativos.reduce((s,t)=>s+t.valor,0);

  // Mês atual
  const now = new Date();
  const mesAtual = finalizados.filter(t => {
    if(!t.checkOut) return false;
    const d = new Date(t.checkOut);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  const totalMes = mesAtual.reduce((s,t)=>s+t.valor,0);
  const ticketMedio = finalizados.length ? totalRecebido / finalizados.length : 0;

  const content = `
    <div class="main-head">
      <div>
        <h1 class="main-h">Carteira · Roster</h1>

          <div class="l">Mês atual</div>
          <div class="v lime">${fmtMoney(totalMes)}</div>
        </div>
        <div class="wallet-block">
          <div class="l">A receber (em curso)</div>
          <div class="v">${fmtMoney(aReceber)}</div>
        </div>
        <div class="wallet-block">
          <div class="l">Ticket médio</div>
          <div class="v">${fmtMoney(ticketMedio)}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-h">
        <h2><i data-lucide="receipt"></i> Histórico de turnos</h2>
        <span class="meta">via Pagar.me · Pix automático</span>
      </div>
      <div class="section-body">
        <table class="table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Estabelecimento</th>
              <th>Função</th>
              <th class="num">Horas</th>
              <th class="num">Recebido</th>

          </thead>
          <tbody>
            ${finalizados.length === 0 ? `<tr><td colspan="6" style="text-align:center;color:#666;padding:40px">Nenhum turno finalizado ainda</td></tr>` :
              finalizados.map(t => {
                const vaga = db.vagas.find(v => v.id === t.vagaId);
                const emp = db.users.find(x => x.id === t.estabId);
                const horas = vaga ? ((new Date(vaga.dataFim) - new Date(vaga.dataIni)) / 36e5).toFixed(1) : '—';
                return `
                  <tr style="cursor:pointer" onclick="location.hash='#/profissional/turno?id=${t.id}'">
                    <td style="font-family:var(--M);font-size:11px">${fmtDate(t.checkOut)}</td>

                    <td class="num" style="font-family:var(--M);color:#888">${horas}h</td>
                    <td class="num pos">${fmtMoney(t.valor)}</td>
                    <td><span style="font-family:var(--M);font-size:9px;color:var(--fhp);letter-spacing:1.5px;text-transform:uppercase;background:var(--fhpd);padding:4px 8px;border:1px solid rgba(0,168,104,.3)">PAGO</span></td>
                  </tr>
                `;
              }).join('')
            }
          </tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('app').innerHTML = shellHTML(u, content, getNavPro(u, 'roster'));
  refreshIcons();
}

// ── Perfil ──
function renderProPerfil(){
  const u = Session.user();
  if(!u.ativo){ location.hash='#/profissional'; return; }

  const idxNivel = niveis.indexOf(u.nivel);

  const content = `
    <div class="main-head">
      <div>
        <h1 class="main-h">Perfil</h1>
        <div class="main-d">Suas configurações de atuação · visíveis no feed dos contratantes</div>
      </div>
    </div>

    <div class="profile">
      <div class="profile-header">
        <div class="profile-avatar">${avatarHTML(u)}</div>
        <div class="profile-info">
          <div class="pn">${escapeHtml(u.nome)}</div>
          <div class="ps">${escapeHtml(u.funcao)} · ${escapeHtml(u.nivel)}</div>
          <div class="pd">${escapeHtml(u.email)} · ${escapeHtml(u.telefone)}</div>
        </div>
      </div>

      <div class="profile-stats">
        <div class="profile-stat">
          <div class="l">Score</div>
          <div class="v">${u.score?.toFixed(1)}</div>
        </div>
        <div class="profile-stat">
          <div class="l">Turnos realizados</div>
          <div class="v">${u.turnos}</div>
        </div>
        <div class="profile-stat">
          <div class="l">MEI</div>
          <div class="v" style="font-size:18px;color:var(--fhp)">ATIVO</div>
        </div>
      </div>

      <div style="margin-bottom:24px">
        <div style="font-family:var(--M);font-size:10px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Trilha de níveis</div>
        <div class="level-bar">
          ${niveis.map((n,i) => {
            const cls = i < idxNivel ? 'passed' : i === idxNivel ? 'current' : '';
            return `<div class="level ${cls}">${n}</div>`;
          }).join('')}
        </div>
        <div style="font-family:var(--M);font-size:10px;color:#666;letter-spacing:1px;margin-top:8px">
          ${u.nivel === 'Elite' ? 'Você está no topo · mantenha score acima de 4.7' :
            u.nivel === 'Destaque' ? 'Faltam mais turnos com score 4.7+ para chegar a Elite' :
            u.nivel === 'Confiável' ? '20 turnos com score acima de 4.5 para virar Destaque' :
            'Complete 5 turnos com score 4.0+ para virar Confiável'}
        </div>
      </div>

      <div class="form-card" style="margin-bottom:0;padding:24px">
        <div style="font-family:var(--F);font-size:18px;letter-spacing:1px;margin-bottom:16px">CONFIGURAÇÕES DE ATUAÇÃO</div>
        <div class="form-grid">
          <div class="field">
            <label>Função primária</label>
            <select id="p-funcao">
              ${['Garçom','Cozinheira','Cozinheiro','Pia','Bartender','Hostess','Forneiro','Pizzaiolo','Auxiliar'].map(f => `<option value="${f}" ${f===u.funcao?'selected':''}>${f}</option>`).join('')}
            </select>
            <span class="hint">Define quais vagas chegam ao seu feed</span>
          </div>
          <div class="field">
            <label>Função adicional 1 <span style="color:var(--t-tertiary);font-weight:400">(opcional)</span></label>
            <select id="p-funcao2">
              <option value="">— sem função extra —</option>
              ${['Garçom','Cozinheira','Cozinheiro','Pia','Bartender','Hostess','Forneiro','Pizzaiolo','Auxiliar'].map(f => `<option value="${f}" ${f===u.funcao2?'selected':''}>${f}</option>`).join('')}
            </select>
            <span class="hint">Vagas dessa função também caem no seu feed</span>
          </div>
          <div class="field">
            <label>Função adicional 2 <span style="color:var(--t-tertiary);font-weight:400">(opcional)</span></label>
            <select id="p-funcao3">
              <option value="">— sem função extra —</option>
              ${['Garçom','Cozinheira','Cozinheiro','Pia','Bartender','Hostess','Forneiro','Pizzaiolo','Auxiliar'].map(f => `<option value="${f}" ${f===u.funcao3?'selected':''}>${f}</option>`).join('')}
            </select>
            <span class="hint">Diversifique seu interesse · mais oportunidades</span>
          </div>
          <div class="field">
            <label>Raio de atuação (km)</label>
            <input type="number" id="p-raio" value="${u.raio}" min="1" max="50" step="1">

            <input type="number" id="p-preco" value="${u.precoHora}" min="20" max="100" step="1">

          <div class="field">
            <label>Cidade</label>
            <input type="text" value="São Paulo" disabled style="opacity:.5">

          <div class="field full">

            <input type="text" id="p-endereco" value="${escapeHtml(u.endereco || '')}" placeholder="Rua, número, bairro · ex: Rua Borges Lagoa 1450, Vila Clementino">

          </div>
          <div class="field">
            <label>CEP</label>
            <input type="text" id="p-cep" value="${escapeHtml(u.cep || '')}" placeholder="00000-000" maxlength="9">

          </div>
          <div class="field">
            <label>Complemento <span style="color:var(--t-tertiary);font-weight:400">(opcional)</span></label>
            <input type="text" id="p-complemento" value="${escapeHtml(u.complemento || '')}" placeholder="Apto, bloco, ponto de referência">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="saveProfile()"><i data-lucide="save"></i> Salvar alterações</button>
        </div>

  `;

  document.getElementById('app').innerHTML = shellHTML(u, content, getNavPro(u, 'perfil'));
  refreshIcons();
}

// ── Feedbacks dos contratantes (avaliações com comentário recebidas) ──
function renderProFeedbacks(){
  const u = Session.user();
  if(!u.ativo){ location.hash='#/profissional'; return; }

  // Pega todos os turnos finalizados onde o pro tem avaliação
  const feedbacks = (db.turnos||[])
    .filter(t => t.proId === u.id && t.status === 'finalizado' && t.avaliacaoEmp)
    .map(t => {
      const emp = db.users.find(x => x.id === t.estabId);
      const vaga = db.vagas.find(v => v.id === t.vagaId);
      return {
        turno:t,
        emp,
        vaga,
        stars:t.avaliacaoEmp.stars,
        comment:t.avaliacaoEmp.comment,
        date:t.checkOut ? new Date(t.checkOut) : null
      };
    })
    .sort((a,b) => (b.date||0) - (a.date||0));

  const total = feedbacks.length;
  const comComentario = feedbacks.filter(f => f.comment);
  const media = total ? (feedbacks.reduce((s,f)=>s+f.stars,0)/total) : 0;
  // Breakdown por estrelas
  const breakdown = [5,4,3,2,1].map(s => ({
    stars:s,
    count:feedbacks.filter(f => f.stars === s).length,
    pct: total ? Math.round(feedbacks.filter(f => f.stars === s).length / total * 100) : 0
  }));

  const content = `
    <div class="main-head">
      <div>
        <h1 class="main-h">Feedbacks recebidos</h1>
        <div class="main-d">O que os contratantes disseram sobre seus turnos</div>
      </div>
    </div>

    ${total === 0 ? `
      <div class="section">
        <div class="section-body">
          <div class="empty">
            <i data-lucide="message-circle"></i>
            <p>Você ainda não recebeu feedbacks · finalize seu primeiro turno e os contratantes podem te avaliar com 1 a 5 ★ e um comentário.</p>
          </div>
        </div>
      </div>
    ` : `
      <div class="kpis">
        <div class="kpi lime" style="grid-column:span 2">
          <div class="kpi-l"><i data-lucide="star"></i> Média geral</div>
          <div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap">
            <div class="kpi-v" style="font-size:48px">${media.toFixed(1)}</div>
            <div style="font-family:var(--F);font-size:18px;color:#F4C95B;letter-spacing:3px">${'★'.repeat(Math.round(media))}${'☆'.repeat(5 - Math.round(media))}</div>
          </div>
          <div class="kpi-d">${total} feedback${total!==1?'s':''} · ${comComentario.length} com comentário</div>
        </div>
        <div class="kpi" style="grid-column:span 2;padding:18px 22px">
          <div class="kpi-l" style="margin-bottom:14px"><i data-lucide="bar-chart-2"></i> Distribuição</div>
          ${breakdown.map(b => `
            <div style="display:grid;grid-template-columns:32px 1fr 36px;align-items:center;gap:10px;margin-bottom:6px">
              <span style="font-family:var(--M);font-size:11px;color:#F4C95B;letter-spacing:.5px">${b.stars}★</span>
              <div style="height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden">
                <div style="height:100%;width:${b.pct}%;background:linear-gradient(90deg,var(--lime) 0%,#F4C95B 100%);transition:width .3s"></div>
              </div>
              <span style="font-family:var(--M);font-size:11px;color:rgba(255,255,255,.65);text-align:right">${b.count}</span>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="depoimentos-row">
        ${feedbacks.map(f => {
          const stars = '★'.repeat(f.stars) + '☆'.repeat(5 - f.stars);
          const dateStr = f.date ? f.date.toLocaleDateString('pt-BR', {day:'2-digit', month:'short', year:'numeric'}) : '';
          const empName = f.emp?.estabelecimento || f.emp?.nome || 'Contratante';
          const empLogo = f.emp?.logo;
          const vFuncao = f.vaga?.funcao || '';
          const valor = f.turno?.valor;
          const avatar = empLogo
            ? `<img src="${escapeHtml(empLogo)}" alt="" style="width:100%;height:100%;object-fit:contain;padding:6px;background:#fff">`
            : `<span>${escapeHtml((empName||'?').charAt(0).toUpperCase())}</span>`;
          return `
            <div class="depoimento-card" style="cursor:pointer" onclick="location.hash='#/profissional/turno?id=${f.turno.id}'">
              <div class="dep-stars">${stars}</div>
              ${f.comment ? `<div class="dep-comment">"${escapeHtml(f.comment)}"</div>` : `<div class="dep-comment" style="opacity:.5;font-style:normal">Sem comentário · apenas avaliação por estrelas</div>`}
              <div class="dep-autor">
                <div class="dep-avatar">${avatar}</div>
                <div class="dep-autor-info">
                  <div class="dep-autor-nome">${escapeHtml(empName)}</div>
                  <div class="dep-autor-role">${escapeHtml(vFuncao)}${dateStr ? ' · '+dateStr : ''}${valor ? ' · '+fmtMoney(valor) : ''}</div>
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `}
  `;

  document.getElementById('app').innerHTML = shellHTML(u, content, getNavPro(u, 'feedbacks'));
  refreshIcons();
}

function saveProfile(){
  const u = Session.user();
  const funcao = document.getElementById('p-funcao').value;
  const funcao2 = document.getElementById('p-funcao2').value;
  const funcao3 = document.getElementById('p-funcao3').value;
  const raio = parseInt(document.getElementById('p-raio').value)||5;
  const preco = parseFloat(document.getElementById('p-preco').value)||25;
  const endereco = document.getElementById('p-endereco').value.trim();
  const cep = document.getElementById('p-cep').value.trim();
  const complemento = document.getElementById('p-complemento').value.trim();
  // Validação · função extra não pode ser igual à primária
  if(funcao2 && funcao2 === funcao){
    showToast('A função adicional 1 não pode ser igual à primária', 'error');
    return;
  }
  if(funcao3 && (funcao3 === funcao || funcao3 === funcao2)){
    showToast('A função adicional 2 deve ser diferente das outras', 'error');
    return;
  }
  const real = db.users.find(x => x.id === u.id);
  if(real){
    real.funcao = funcao;
    real.funcao2 = funcao2 || null;
    real.funcao3 = funcao3 || null;
    real.raio = raio;
    real.precoHora = preco;
    real.endereco = endereco;
    real.cep = cep;
    real.complemento = complemento;
    DB.save(db);
    showToast('Perfil atualizado');
    route();
  }
}
</script>
