<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TURNI · Hospitalidade on-demand</title>
<meta name="description" content="Hospitalidade. Match IA · PIN Bilateral · Pix em 15min.">
<meta name="theme-color" content="#00A868">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TURNI">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="img/icon-192.png">
<!-- Sprint B.1 · Performance mobile inferior · 3G/Android budget -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://i.pravatar.cc" crossorigin>
<link rel="dns-prefetch" href="https://unpkg.com">
<!-- Critical font · Bebas Neue · usada acima da dobra na sidebar -->
<link rel="preload" as="font" type="font/woff2" crossorigin href="https://fonts.gstatic.com/s/bebasneue/v14/JTUSjIg69CK48gW7PXoo9Wlhyw.woff2">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
<!-- Demo guiada · tour navegável com legendas (compartilhado com index.html) -->
<link rel="stylesheet" href="tour.css">
<script src="tour.js" defer></script>
<style>
  /* ════ TURNI · NOVA IDENTIDADE ATMOSPHERIC ════ */
  /* Inspirada em DocShield: gradientes suaves, cards arredondados, tipografia editorial,
     sem CAPS abusivo, sombras quase invisíveis. Dual theme (light/dark) por user choice. */

  :root{
    /* Fontes */
    --F:'Inter',-apple-system,sans-serif;
    --B:'Inter',-apple-system,sans-serif;
    --M:'JetBrains Mono',monospace;
    --F-logo:'Bebas Neue',sans-serif;

    /* Light mode · off-white quente como base · cards escuros carregam a cor */
    --bg:#F7F4EC;
    --s1:#FFFFFF;
    --s2:#F0EDE3;
    --s3:#E8E5DB;
    --b1:#E0DDD3;
    --b2:#C8C5BB;
    --b3:#A8A59B;

    /* Texto */
    --w:#0F1B2D;            /* primary text */
    --t-secondary:#42504A;
    --t-tertiary:#6F7C72;
    --t-quaternary:#A0A8A0;

    /* Accents semânticos · paleta semântica nova */
    --lime:#2D5F3F;          /* verde sage · TRABALHADOR ATIVO */
    --lime-2:#3A7050;
    --ld:#E5F0E8;            /* lime soft */
    --orange:#B8842F;        /* MOSTARDA · CONTRATANTE ativo */
    --orange-2:#9A6E25;
    --od:#FBEED1;            /* mostarda soft */
    --admin:#C73838;         /* VERMELHO · SUPER ADMIN */
    --admin-2:#A52828;
    --ad:#FBE0E0;            /* admin soft */
    --fhp:#2D7A4F;           /* verde sucesso */
    --fhpd:#E2F0E5;
    --yellow:#D4A85C;        /* AMARELO · pré-cadastro TRABALHADOR */
    --yd:#FBEDD3;
    --blue:#4A6FA5;          /* AZUL · pré-cadastro CONTRATANTE */
    --bd:#E0E9F5;
    --red:#B83A3A;           /* error */
    --rd:#FBE2E2;
    --sage:#5B9E7A;
    --sage2:#42504A;

    /* Gradients atmospheric · LIGHT THEME · off-white quente · combina com mostarda+verde */
    --grad-pro:linear-gradient(180deg,#F7F4EC 0%,#F2EFE5 100%);
    --grad-emp:linear-gradient(180deg,#F7F4EC 0%,#F2EFE5 100%);
    --grad-admin:linear-gradient(180deg,#F7F4EC 0%,#F2EFE5 100%);

    /* Sombras suaves · estilo Mercury/DocShield */
    --shadow-1:0 1px 2px rgba(15,27,45,.04);
    --shadow-2:0 1px 2px rgba(15,27,45,.04),0 4px 12px rgba(15,27,45,.04);
    --shadow-3:0 1px 2px rgba(15,27,45,.04),0 8px 24px rgba(15,27,45,.06);
    --shadow-elev:0 4px 16px rgba(15,27,45,.08),0 16px 48px rgba(15,27,45,.06);

    /* Radii */
    --r-sm:8px;
    --r-md:12px;
    --r-lg:16px;
    --r-xl:24px;
    --r-pill:999px;
  }

  /* Dark mode · ativado via [data-theme="dark"] no <html> */
  [data-theme="dark"]{
    --bg:#0F1411;
    --s1:#1A2018;
    --s2:#232A24;
    --s3:#2C342E;
    --b1:#2A322D;
    --b2:#3A4338;
    --b3:#52594F;

    --w:#ECEDE5;
    --t-secondary:#A8B2A8;
    --t-tertiary:#8B9590;
    --t-quaternary:#6F7C72;

    --lime:#5FA37C;
    --lime-2:#6CB089;
    --ld:rgba(95,163,124,.12);
    --orange:#D4A95C;       /* MOSTARDA mais claro pra dark · CONTRATANTE */
    --orange-2:#E5B968;
    --od:rgba(212,169,92,.14);
    --admin:#E25858;        /* VERMELHO mais claro pra dark · ADMIN */
    --admin-2:#EE6E6E;
    --ad:rgba(226,88,88,.14);
    --fhp:#5FA37C;
    --fhpd:rgba(95,163,124,.12);
    --yellow:#E8C273;       /* AMARELO claro · pré-cadastro TRABALHADOR */
    --yd:rgba(232,194,115,.14);
    --blue:#6A8FCC;         /* AZUL claro · pré-cadastro CONTRATANTE */
    --bd:rgba(106,143,204,.14);
    --red:#D85A5A;
    --rd:rgba(216,90,90,.12);

    --grad-pro:linear-gradient(180deg,#1F2E25 0%,#2A352D 35%,#1F2520 75%,#181B17 100%);
    --grad-emp:linear-gradient(180deg,#3A2A12 0%,#2E2010 35%,#1F1608 75%,#140E04 100%);
    --grad-admin:linear-gradient(135deg,#3A0808 0%,#1A0303 50%,#000000 100%);

    --shadow-1:0 1px 2px rgba(0,0,0,.2);
    --shadow-2:0 1px 2px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.15);
    --shadow-3:0 1px 2px rgba(0,0,0,.2),0 8px 24px rgba(0,0,0,.2);
    --shadow-elev:0 4px 16px rgba(0,0,0,.4),0 16px 48px rgba(0,0,0,.3);
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--w);font-family:var(--B);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5;letter-spacing:-.005em}
  ::selection{background:var(--lime);color:#fff}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
  input,select,textarea{font-family:inherit}
  img{display:block;max-width:100%}

  /* Demo bar discreta */
  .demo-bar{position:sticky;top:0;z-index:100;background:var(--s1);color:var(--t-secondary);
    text-align:center;font-family:var(--M);font-size:11px;font-weight:500;letter-spacing:.3px;
    padding:8px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:center;gap:12px}
  .demo-bar .pill{background:var(--w);color:var(--bg);padding:2px 10px;border-radius:var(--r-pill);font-size:10px;letter-spacing:.3px}
  .demo-bar a{color:var(--lime);text-decoration:none;font-weight:500}
  .demo-bar a:hover{text-decoration:underline}

  /* Theme toggle */
  .theme-toggle{position:fixed;top:48px;right:24px;z-index:200;
    width:42px;height:42px;border-radius:var(--r-pill);
    background:var(--s1);border:1px solid var(--b1);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:var(--shadow-2);transition:all .2s}
  .theme-toggle:hover{transform:scale(1.05);box-shadow:var(--shadow-3)}
  .theme-toggle svg{width:18px;height:18px;color:var(--w);stroke-width:1.8}

  /* ════ LOGIN SCREEN · split editorial · imagem da equipe + form ════
     Layout: 50/50 desktop · stack vertical mobile · imagem persistente como hero ── */
  .login{min-height:100vh;background:var(--bg);position:relative;overflow:hidden;display:grid;grid-template-columns:1fr 1fr}
  [data-theme="dark"] .login{background:#0E1411}

  /* Coluna esquerda · imagem da equipe full-bleed + overlay editorial */
  .login-hero{
    position:relative;background-image:url('img/12-equipe-fundo.jpg');
    background-size:cover;background-position:center;
    min-height:100vh;color:#fff;
    display:flex;flex-direction:column;justify-content:space-between;
    padding:48px 56px;overflow:hidden;
  }
  /* Overlay multi-camada · escurece para dar respaldo ao texto · gradient verde TURNI no rodapé */
  .login-hero::before{
    content:'';position:absolute;inset:0;
    background:
      linear-gradient(180deg,rgba(15,40,24,.55) 0%,rgba(15,40,24,.30) 35%,rgba(15,40,24,.75) 100%),
      linear-gradient(135deg,rgba(0,168,104,.18) 0%,transparent 60%);
    z-index:1;pointer-events:none;
  }
  .login-hero > *{position:relative;z-index:2}
  .login-hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
  .login-hero-logo{
    font-family:var(--F-logo);font-size:64px;letter-spacing:5px;line-height:1;
    color:#fff;
  }
  .login-hero-logo .di{color:#7BC299}
  .login-hero-logo .de{-webkit-text-stroke:1.5px #7BC299;color:transparent}
  .login-hero-back{
    font-family:var(--M);font-size:11px;letter-spacing:1.8px;text-transform:uppercase;
    color:rgba(255,255,255,.85);text-decoration:none;
    display:inline-flex;align-items:center;gap:8px;padding:10px 16px;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:999px;
    backdrop-filter:blur(8px);transition:all .2s;
  }
  .login-hero-back:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.35)}
  .login-hero-back svg{width:13px;height:13px;stroke-width:2}

  .login-hero-bottom{margin-top:auto}
  .login-hero-eyebrow{
    font-family:var(--M);font-size:11px;letter-spacing:3px;text-transform:uppercase;
    color:#9DD9B0;margin-bottom:18px;
    display:inline-flex;align-items:center;gap:8px;
  }
  .login-hero-eyebrow::before{
    content:'';width:8px;height:8px;border-radius:50%;background:#9DD9B0;
    animation:pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
  .login-hero-h{
    font-family:var(--F);font-size:54px;font-weight:500;letter-spacing:-1.2px;
    line-height:1.05;color:#fff;margin-bottom:14px;
    text-shadow:0 2px 24px rgba(0,0,0,.35);
  }
  .login-hero-d{
    font-size:15.5px;color:rgba(255,255,255,.85);line-height:1.6;
    max-width:440px;margin-bottom:28px;
    text-shadow:0 1px 12px rgba(0,0,0,.4);
  }
  .login-hero-pillars{
    display:flex;gap:16px;flex-wrap:wrap;
    padding-top:20px;border-top:1px solid rgba(255,255,255,.18);
    font-family:var(--M);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;
    color:rgba(255,255,255,.75);
  }
  .login-hero-pillar{display:inline-flex;align-items:center;gap:6px}
  .login-hero-pillar svg{width:13px;height:13px;color:#7BC299;stroke-width:2}

  /* Coluna direita · form de login real */
  .login-form-col{
    display:flex;flex-direction:column;justify-content:center;
    padding:64px 56px;min-height:100vh;
    background:var(--bg);
  }
  .login-form-wrap{max-width:420px;width:100%;margin:0 auto}
  .login-form-eyebrow{
    font-family:var(--M);font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--lime);margin-bottom:14px;
  }
  .login-form-h{
    font-family:var(--F);font-size:36px;font-weight:500;letter-spacing:-.8px;
    line-height:1.1;color:var(--w);margin-bottom:10px;
  }
  .login-form-d{
    font-size:14px;color:var(--t-secondary);line-height:1.55;margin-bottom:32px;
  }
  .login-form-field{margin-bottom:16px}
  .login-form-field label{
    display:block;font-family:var(--M);font-size:10.5px;letter-spacing:1.8px;text-transform:uppercase;
    color:var(--t-tertiary);margin-bottom:8px;
  }
  .login-form-input{
    width:100%;padding:14px 16px;background:var(--s1);
    border:1px solid var(--b1);border-radius:var(--r-md);
    font-family:var(--B);font-size:16px;color:var(--w);
    transition:border-color .15s, box-shadow .15s;
  }
  .login-form-input:focus{
    outline:none;border-color:var(--lime);
    box-shadow:0 0 0 3px rgba(46,125,77,.12);
  }
  .login-form-meta{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:-4px;margin-bottom:24px;
  }
  .login-form-remember{
    display:inline-flex;align-items:center;gap:8px;cursor:pointer;
    font-size:13px;color:var(--t-secondary);font-family:var(--B);
  }
  .login-form-remember input{accent-color:var(--lime);width:14px;height:14px}
  .login-form-forgot{
    font-family:var(--M);font-size:11px;letter-spacing:1.2px;text-transform:uppercase;
    color:var(--t-tertiary);text-decoration:none;
    transition:color .15s;
  }
  .login-form-forgot:hover{color:var(--lime)}
  .login-form-cta{
    width:100%;padding:16px;background:var(--lime);color:#fff;
    border:none;border-radius:var(--r-pill);
    font-family:var(--F);font-size:15px;font-weight:500;letter-spacing:.2px;
    cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:10px;
    transition:transform .12s, box-shadow .15s;
    box-shadow:0 6px 20px rgba(46,125,77,.32);
  }
  .login-form-cta:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(46,125,77,.42)}
  .login-form-cta svg{width:16px;height:16px;stroke-width:2}
  .login-form-divider{
    display:flex;align-items:center;gap:14px;margin:28px 0 22px;
    font-family:var(--M);font-size:10.5px;letter-spacing:2px;text-transform:uppercase;
    color:var(--t-tertiary);
  }
  .login-form-divider::before,
  .login-form-divider::after{content:'';flex:1;height:1px;background:var(--b1)}
  .login-form-signup{
    display:block;text-align:center;
    padding:14px;background:transparent;
    border:1px solid var(--b1);border-radius:var(--r-pill);
    font-family:var(--F);font-size:14px;font-weight:500;color:var(--w);
    text-decoration:none;transition:all .15s;
  }
  .login-form-signup:hover{border-color:var(--lime);color:var(--lime);background:rgba(46,125,77,.04)}
  .login-form-signup b{color:var(--lime);font-weight:500}

  /* Demo drawer · expansível · mantém acesso à demo de personas */
  .login-demo-drawer{
    margin-top:36px;padding-top:24px;
    border-top:1px dashed var(--b1);
  }
  .login-demo-toggle{
    width:100%;background:transparent;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:8px 0;font-family:var(--M);font-size:10.5px;
    letter-spacing:2px;text-transform:uppercase;color:var(--t-tertiary);
    transition:color .15s;
  }
  .login-demo-toggle:hover{color:var(--lime)}
  .login-demo-toggle svg{width:14px;height:14px;stroke-width:2;transition:transform .25s}
  .login-demo-drawer.open .login-demo-toggle svg{transform:rotate(180deg)}
  .login-demo-content{
    max-height:0;overflow:hidden;
    transition:max-height .35s cubic-bezier(.4,.2,.3,1);
  }
  .login-demo-drawer.open .login-demo-content{max-height:1200px;margin-top:18px}
  .login-demo-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .login-demo-tab{
    padding:7px 12px;border:1px solid var(--b1);background:var(--s1);
    border-radius:999px;font-family:var(--B);font-size:11.5px;font-weight:500;
    color:var(--t-secondary);cursor:pointer;transition:all .15s;
    display:inline-flex;align-items:center;gap:6px;
  }
  .login-demo-tab .badge{
    background:var(--s2);color:var(--t-tertiary);padding:1px 6px;border-radius:999px;
    font-size:10px;font-family:var(--M);
  }
  .login-demo-tab.active{background:var(--w);color:var(--bg);border-color:var(--w)}
  [data-theme="dark"] .login-demo-tab.active{background:#fff;color:#0F1411;border-color:#fff}
  .login-demo-tab.active .badge{background:rgba(255,255,255,.2);color:inherit}
  .login-demo-grid{
    display:grid;grid-template-columns:1fr;gap:6px;
    max-height:380px;overflow-y:auto;padding-right:4px;
  }
  .login-demo-grid::-webkit-scrollbar{width:6px}
  .login-demo-grid::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
  .login-demo-row{
    display:grid;grid-template-columns:36px 1fr auto;gap:12px;align-items:center;
    padding:10px 12px;background:var(--s1);
    border:1px solid var(--b1);border-radius:var(--r-md);
    cursor:pointer;transition:all .15s;
  }
  .login-demo-row:hover{border-color:var(--lime);background:var(--ld)}
  .login-demo-row.role-emp:hover{border-color:var(--orange);background:rgba(244,160,76,.06)}
  .login-demo-row.role-admin:hover{border-color:var(--admin);background:rgba(199,56,56,.06)}
  .login-demo-row.role-pending:hover,
  .login-demo-row.role-emp-pending:hover,
  .login-demo-row.role-pro-pending:hover{border-color:var(--yellow);background:rgba(255,214,0,.08)}
  .login-demo-avatar{
    width:32px;height:32px;border-radius:999px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;
    font-family:var(--F);font-size:13px;color:#fff;
  }
  .login-demo-avatar img{width:100%;height:100%;object-fit:cover}
  .role-pro .login-demo-avatar{background:var(--lime)}
  .role-emp .login-demo-avatar{background:var(--orange)}
  .role-admin .login-demo-avatar{background:var(--admin)}
  .role-pending .login-demo-avatar,
  .role-pro-pending .login-demo-avatar,
  .role-emp-pending .login-demo-avatar{background:var(--yellow);color:#2A1D08}
  .login-demo-info{min-width:0}
  .login-demo-name{
    font-family:var(--F);font-size:13.5px;font-weight:500;color:var(--w);
    line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .login-demo-role{
    font-family:var(--M);font-size:10px;letter-spacing:.2px;color:var(--t-tertiary);
    margin-top:2px;
  }
  .login-demo-arrow{
    color:var(--t-tertiary);
  }
  .login-demo-arrow svg{width:14px;height:14px;stroke-width:2}

  .login-foot-reset{
    margin-top:24px;text-align:center;
    font-family:var(--M);font-size:9px;letter-spacing:2px;text-transform:uppercase;
  }
  .login-foot-reset button{
    background:none;border:0;color:var(--t-tertiary);cursor:pointer;text-decoration:underline;
    font-family:inherit;font-size:inherit;letter-spacing:inherit;
    transition:color .15s;
  }
  .login-foot-reset button:hover{color:var(--lime)}

  /* Mobile · stack vertical · imagem hero compacto */
  @media(max-width:900px){
    .login{grid-template-columns:1fr}
    .login-hero{
      min-height:auto;padding:32px 24px;
      height:50vh;max-height:380px;
    }
    .login-hero-logo{font-size:42px;letter-spacing:3px}
    .login-hero-h{font-size:32px;letter-spacing:-.6px}
    .login-hero-d{font-size:13.5px}
    .login-hero-pillars{font-size:9.5px;gap:12px}
    .login-form-col{padding:32px 24px;min-height:auto}
    .login-form-h{font-size:28px}
  }

  /* Role tabs em pílulas */
  .role-tabs{display:flex;justify-content:center;gap:8px;margin:40px 0 28px;flex-wrap:wrap}
  .role-tab{padding:10px 18px;border:1px solid var(--b1);background:var(--s1);border-radius:var(--r-pill);
    font-family:var(--B);font-size:13px;font-weight:500;color:var(--t-secondary);
    cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
  .role-tab .badge{background:var(--s2);color:var(--t-tertiary);padding:1px 8px;border-radius:var(--r-pill);font-size:11px;font-family:var(--M);font-weight:500}
  .role-tab:hover{color:var(--w);border-color:var(--b2)}
  .role-tab.active{background:#0F1B2D;color:#FFFFFF;border-color:#0F1B2D}
  [data-theme="dark"] .role-tab.active{background:#FFFFFF;color:#0F1411;border-color:#FFFFFF}
  .role-tab.active .badge{background:rgba(255,255,255,.2);color:inherit}

  /* Persona cards · gradient tonal correspondente ao perfil · sofisticação atmospheric */
  /* Frame externo "bordas vazadas" estilo Talamus · containers internos respirando */
  .persona-frame{
    background:rgba(255,255,255,.45);
    border:1px solid rgba(15,27,45,.08);
    border-radius:32px;
    padding:14px;
    margin-top:8px;
    backdrop-filter:blur(12px);
    box-shadow:0 8px 32px rgba(15,27,45,.04);
  }
  [data-theme="dark"] .persona-frame{
    background:rgba(255,255,255,.03);
    border-color:rgba(255,255,255,.08);
  }

  /* ── APP SHELL · sidebar respirado, main com gradient atmospheric ── */
  /* Suporta sidebar collapsada · 64px só ícones · estilo macOS Finder */
  .shell{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 33px);background:var(--bg);transition:grid-template-columns .25s cubic-bezier(.16,1,.3,1)}
  body.sb-collapsed .shell{grid-template-columns:64px 1fr}

  .sidebar{background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;position:relative}
  /* Toggle collapse/expand · botão estilo macOS no header da sidebar */
  .sb-toggle{
    position:absolute;top:16px;right:12px;
    width:24px;height:24px;border-radius:6px;
    background:var(--s2);border:1px solid var(--b1);
    display:flex;align-items:center;justify-content:center;
    color:var(--t-tertiary);cursor:pointer;
    transition:all .15s;z-index:5;
  }
  .sb-toggle:hover{background:var(--bg);color:var(--w);border-color:var(--b2)}
  .sb-toggle svg{width:13px;height:13px;stroke-width:2;transition:transform .25s}
  body.sb-collapsed .sb-toggle svg{transform:rotate(180deg)}
  body.sb-collapsed .sb-toggle{
    right:50%;transform:translateX(50%);
    top:16px;
  }
  /* Quando collapsada, esconde textos e ajusta paddings */
  body.sb-collapsed .sb-tag,
  body.sb-collapsed .sb-uinfo,
  body.sb-collapsed .sb-section-l,
  body.sb-collapsed .sb-item span,
  body.sb-collapsed .sb-item .sb-count,
  body.sb-collapsed .sb-foot-text{display:none}
  body.sb-collapsed .sb-head{padding:60px 0 16px;text-align:center;border-bottom:1px solid var(--b1)}
  body.sb-collapsed .sb-logo{font-size:20px;letter-spacing:1px}
  body.sb-collapsed .sb-user{padding:12px 0;justify-content:center;gap:0}
  body.sb-collapsed .sb-avatar{width:36px;height:36px;font-size:14px}
  body.sb-collapsed .sb-section{padding:14px 0 4px;text-align:center}
  body.sb-collapsed .sb-item{
    margin:0 8px 4px;
    padding:10px;
    justify-content:center;
    position:relative;
  }
  body.sb-collapsed .sb-item svg{width:18px;height:18px}
  /* Tooltip no hover quando collapsada */
  body.sb-collapsed .sb-item::after{
    content:attr(data-label);
    position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%) translateX(-6px);
    background:var(--s2);color:var(--w);
    padding:6px 12px;border-radius:8px;
    font-family:var(--B);font-size:12px;letter-spacing:-.1px;font-weight:500;
    border:1px solid var(--b1);box-shadow:var(--shadow-2);
    white-space:nowrap;z-index:100;
    opacity:0;pointer-events:none;
    transition:opacity .15s,transform .15s;
  }
  body.sb-collapsed .sb-item:hover::after{opacity:1;transform:translateY(-50%) translateX(0)}

    padding:8px 4px;text-decoration:none;
    color:rgba(255,255,255,.6);
    min-height:54px;min-width:44px;
    cursor:pointer;background:transparent;border:0;
    transition:color .15s,background .15s;
    border-radius:10px;
    position:relative;
  }
  .bn-item:hover{color:rgba(255,255,255,.85)}
  .bn-item.active{color:#fff}
  .bn-item.active::before{
    content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:24px;height:2px;border-radius:0 0 4px 4px;
    background:#7BC299;
  }
  .body-emp .bn-item.active::before{background:#F4C95B}
  .body-admin .bn-item.active::before{background:#E84545}
  .bn-item svg{width:22px;height:22px;stroke-width:1.8}
  .bn-item span{font-size:10px;font-weight:500;letter-spacing:.2px;text-align:center}
  .bn-item .bn-count{
    position:absolute;top:6px;right:25%;
    background:#E84545;color:#fff;
    font-family:var(--M);font-size:9px;font-weight:600;
    padding:1px 5px;border-radius:999px;min-width:14px;text-align:center;
  }

  /* Mobile: sidebar some · bottom nav aparece · main respira pra cima */
  @media(max-width:768px){
    .bottom-nav{display:flex}
    .shell{grid-template-columns:1fr !important}
    .sidebar{display:none !important}
    .main{padding:24px 16px 100px !important;max-height:none !important}
  }

  /* ════════════════════════════════════════════════════════════════
     INPUTS 16px+ em mobile · resolve auto-zoom do iOS Safari
     Touch targets mínimos 44x44px · convenção Apple/Google
     ════════════════════════════════════════════════════════════════ */
  @media(max-width:768px){
    .field input,.field select,.field textarea,
    .cadastro-form-input,.cadastro-form-select,
    input[type="text"],input[type="email"],input[type="tel"],
    input[type="number"],input[type="password"],
    input[type="datetime-local"],input[type="date"],
    select,textarea{font-size:16px !important}

    /* Touch targets · mínimo 44x44 nos botões pequenos do app */
    .btn-mini{min-height:44px;padding:10px 16px}
    .role-tab{min-height:44px;display:inline-flex;align-items:center}
    .sb-toggle,.theme-toggle{min-width:44px;min-height:44px}

    /* Saudação responsive · evita quebra feia da tagline */
    .main-h{font-size:24px !important;line-height:1.2}
    .main-d{font-size:13px}

    /* Filtros do feed em scroll horizontal · não wrap em mobile */
    [class*="role-tab"]+[class*="role-tab"]{margin-left:6px}
  }

  /* ════════════════════════════════════════════════════════════════
     P0.2 · Cards .vaga em layout VERTICAL no mobile
     Empilha logo + info + match-pill + status um abaixo do outro
     ════════════════════════════════════════════════════════════════ */
  @media(max-width:560px){
    .vaga{
      grid-template-columns:1fr !important;
      gap:12px;
      padding:18px 16px;
    }
    .v-badge,.emp-logo{
      width:44px;height:44px;
      align-self:flex-start;
    }
    .v-info .v-funcao{font-size:17px}
    .v-info .v-meta{gap:10px;font-size:11px}
    .v-cands{
      text-align:left;min-width:0;
      padding-top:12px;border-top:1px solid rgba(255,255,255,.08);
    }
    .v-cands b{display:inline-block;font-size:18px;margin-right:6px}
    .v-status{align-self:flex-start;margin-top:0}
  }

  /* ════════════════════════════════════════════════════════════════
     P0.4 · Kanban → tabs no mobile · 1 lista por vez · scroll horizontal de tabs
     ════════════════════════════════════════════════════════════════ */
  @media(max-width:768px){
    .kanban{
      display:flex;flex-direction:column;gap:12px;
      grid-template-columns:none;
    }
    .kanban-col{
      min-height:auto;
      border-top-width:1px !important;
      border-left:3px solid var(--b1);
      border-radius:10px;
    }
    .kanban-col.curso{border-left-color:var(--blue)}
    .kanban-col.conf{border-left-color:var(--yellow)}
    .kanban-col.fim{border-left-color:var(--fhp)}
    /* Header da coluna fica como "tab tag" no mobile */
    .kanban-col .kanban-h{padding:14px 16px}
    .kanban-col .kanban-h-title{font-size:13px}
  }

  /* ════════════════════════════════════════════════════════════════
     P1.1 · FAB "Nova vaga" · botão flutuante no contratante mobile
     Material Design pattern · 56px circle · canto inferior direito
     ════════════════════════════════════════════════════════════════ */
  .fab-vaga{
    display:none;
    position:fixed;right:18px;bottom:90px;z-index:99;
    width:56px;height:56px;border-radius:50%;
    background:linear-gradient(135deg,var(--orange) 0%,#D4A85C 100%);
    color:#fff;border:0;cursor:pointer;
    box-shadow:0 6px 16px rgba(184,132,47,.40),0 12px 32px rgba(0,0,0,.18);
    align-items:center;justify-content:center;
    transition:transform .2s,box-shadow .2s;
    text-decoration:none;
  }
  .fab-vaga:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 10px 24px rgba(184,132,47,.55),0 16px 40px rgba(0,0,0,.22)}
  .fab-vaga:active{transform:scale(.96)}
  .fab-vaga svg{width:26px;height:26px;stroke-width:2.5}
  .body-emp .fab-vaga{display:flex}
  @media(min-width:769px){
    .body-emp .fab-vaga{display:none}
  }

  /* ════════════════════════════════════════════════════════════════
     P1.6 · Carrossel de depoimentos no mobile · scroll horizontal
     ════════════════════════════════════════════════════════════════ */
  @media(max-width:560px){
    .depoimentos-row{
      grid-template-columns:none !important;
      display:flex;overflow-x:auto;scroll-snap-type:x mandatory;
      gap:12px;padding-bottom:12px;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }
    .depoimentos-row::-webkit-scrollbar{display:none}
    .depoimentos-row > .depoimento-card{
      flex:0 0 86%;scroll-snap-align:center;
    }
  }

  /* ════════════════════════════════════════════════════════════════
     P1.7 · WCAG AA fix · contraste de tons cinzas
     prefers-color-scheme · respeita preferência do sistema no 1º load
     ════════════════════════════════════════════════════════════════ */
  /* Cinzas antigos (#6F7C72 / #8B8870) falhavam WCAG AA em texto pequeno
     · ajustados para 4.5:1+ sobre off-white */
  :root{
    --t-tertiary-fixed:#5F6862;
    --t-quaternary-fixed:#7A6F5A;
  }

  /* ════════════════════════════════════════════════════════════════
     HIST-ROW · linha compacta de turno · histórico/financeiro
     ════════════════════════════════════════════════════════════════ */
  .hist-list{padding:0}
  .hist-row{
    display:grid;grid-template-columns:64px 1fr auto;gap:14px;align-items:center;
    padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.10);cursor:pointer;
    transition:background .15s;
  }
  .hist-row:last-child{border-bottom:0}
  .hist-row:hover{background:rgba(255,255,255,.04)}
  .hist-data{
    text-align:center;padding-right:14px;border-right:1px solid rgba(255,255,255,.10);
  }
  .hist-data-d{font-family:var(--F);font-size:14px;font-weight:500;color:#fff;letter-spacing:-.2px;line-height:1.1}
  .hist-data-y{font-family:var(--M);font-size:10px;color:rgba(255,255,255,.55);letter-spacing:.1px;margin-top:2px}
  .hist-info{min-width:0}
  .hist-fn{font-family:var(--F);font-size:15px;font-weight:500;color:#fff;letter-spacing:-.1px;line-height:1.2;margin-bottom:4px}
  .hist-emp{color:rgba(255,255,255,.75);font-weight:400}
  .hist-fb{
    display:flex;align-items:center;gap:6px;flex-wrap:wrap;
    font-family:var(--B);font-size:12px;color:rgba(255,255,255,.7);line-height:1.4;
  }
  .hist-fb.muted{color:rgba(255,255,255,.5)}
  .hist-fb svg{width:11px;height:11px;stroke-width:2}
  .hist-stars{font-family:var(--F);font-size:13px;letter-spacing:1px;color:#F4C95B}
  .hist-fb-text{font-style:italic;color:rgba(255,255,255,.7)}
  .hist-fb-text.muted{font-style:normal;opacity:.6}
  .hist-valor{
    font-family:var(--F);font-size:16px;font-weight:500;color:#fff;letter-spacing:-.2px;
    text-align:right;white-space:nowrap;
  }
  .hist-valor.pos{color:#7BC299}
  .body-emp .hist-valor.pos{color:#F4C95B}

  @media(max-width:560px){
    .hist-row{grid-template-columns:54px 1fr;gap:10px;padding:12px 14px}
    .hist-data{padding-right:10px}
    .hist-data-d{font-size:13px}
    .hist-valor{
      grid-column:1/-1;text-align:left;font-size:15px;
      padding-top:8px;border-top:1px dashed rgba(255,255,255,.06);margin-top:4px;
    }
    .hist-fn{font-size:14px}
  }

  /* Zebra · alterna sutilmente fundo das linhas de hist-row em containers .hist-list */
  .hist-list .hist-row:nth-child(even){background:rgba(255,255,255,.025)}
  .hist-list .hist-row:hover{background:rgba(255,255,255,.06)}

  /* ════════════════════════════════════════════════════════════════
     SPRINT B.2 · Skeleton placeholders + image lazy-load
     Otimização para mobile inferior (3G + Android budget)
     ════════════════════════════════════════════════════════════════ */
  /* Container que tem foto · mostra skeleton enquanto carrega */
  .has-skeleton{position:relative;overflow:hidden}
  .has-skeleton::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(110deg, var(--s2) 30%, rgba(255,255,255,.08) 50%, var(--s2) 70%);
    background-size:200% 100%;
    animation:skeleton-shimmer 1.4s ease-in-out infinite;
    z-index:1;pointer-events:none;
  }
  /* Quando a img carrega · class .img-loaded é adicionada → some o shimmer */
  .has-skeleton.img-loaded::before{display:none}
  @keyframes skeleton-shimmer{
    0%{background-position:100% 0}
    100%{background-position:-100% 0}
  }
  /* Imagens com lazy + fade-in */
  img.lazy-img{opacity:0;transition:opacity .25s ease-out}
  img.lazy-img.loaded{opacity:1}
  /* Imagens em modo offline · fallback elegante */
  img.lazy-img.failed{opacity:0;display:none}
  .img-failed-fallback{
    display:flex;align-items:center;justify-content:center;
    width:100%;height:100%;
    background:var(--s2);color:var(--t-tertiary);
    font-family:var(--F);font-weight:500;
  }

  /* ════════════════════════════════════════════════════════════════
     SPRINT B.4 · Banner PWA install · pós-2º login
     Editorial · convida a instalar o app · só aparece quando elegível
     ════════════════════════════════════════════════════════════════ */
  .pwa-install-banner{
    position:fixed;bottom:84px;left:14px;right:14px;
    z-index:90;
    background:linear-gradient(135deg, var(--lime) 0%, var(--lime-2) 100%);
    color:#fff;padding:16px 18px;
    border-radius:var(--r-lg);box-shadow:0 14px 40px rgba(0,0,0,.35);
    display:none;align-items:center;gap:14px;
    animation:pwa-slide-up .45s cubic-bezier(.2,.8,.3,1);
  }
  .body-emp .pwa-install-banner{
    background:linear-gradient(135deg, var(--orange) 0%, #D9A441 100%);
  }
  .pwa-install-banner.show{display:flex}
  @keyframes pwa-slide-up{
    from{transform:translateY(140%);opacity:0}
    to{transform:translateY(0);opacity:1}
  }
  .pwa-install-icon{
    width:42px;height:42px;border-radius:var(--r-pill);
    background:rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .pwa-install-icon svg{width:20px;height:20px;color:#fff;stroke-width:2}
  .pwa-install-info{flex:1;min-width:0}
  .pwa-install-h{
    font-family:var(--F);font-size:14px;font-weight:500;letter-spacing:-.1px;
    line-height:1.2;margin-bottom:2px;
  }
  .pwa-install-d{
    font-family:var(--M);font-size:10.5px;letter-spacing:.2px;
    line-height:1.4;opacity:.92;
  }
  .pwa-install-actions{display:flex;gap:8px;flex-shrink:0}
  .pwa-install-btn{
    padding:9px 14px;background:#fff;color:var(--lime);
    border:none;border-radius:var(--r-pill);
    font-family:var(--F);font-size:12.5px;font-weight:500;letter-spacing:.1px;
    cursor:pointer;white-space:nowrap;
    transition:transform .12s;
  }
  .body-emp .pwa-install-btn{color:var(--orange)}
  .pwa-install-btn:hover{transform:translateY(-1px)}
  .pwa-install-dismiss{
    width:32px;height:32px;background:transparent;color:rgba(255,255,255,.85);
    border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
    border-radius:var(--r-pill);
  }
  .pwa-install-dismiss:hover{background:rgba(255,255,255,.15)}
  .pwa-install-dismiss svg{width:16px;height:16px;stroke-width:2}
  /* Em desktop · esconde · só faz sentido em mobile */
  @media(min-width:900px){
    .pwa-install-banner{display:none !important}
  }

  /* ════════════════════════════════════════════════════════════════
     SPRINT C · Camada de insight
     Insight financeiro · breakdown match · duplicar vaga · export PDF
     ════════════════════════════════════════════════════════════════ */

  /* C.1 · Card de insight editorial no topo do financeiro */
  .insight-card{
    display:flex;align-items:flex-start;gap:18px;
    padding:20px 24px;margin-bottom:18px;
    background:linear-gradient(135deg, var(--ld) 0%, transparent 70%);
    border:1px solid rgba(46,125,77,.25);
    border-radius:var(--r-lg);
    position:relative;overflow:hidden;
  }
  .body-emp .insight-card{
    background:linear-gradient(135deg, rgba(244,160,76,.10) 0%, transparent 70%);
    border-color:rgba(244,160,76,.25);
  }
  .insight-card::before{
    content:'';position:absolute;top:-30px;right:-30px;
    width:140px;height:140px;border-radius:50%;
    background:radial-gradient(circle, var(--lime) 0%, transparent 70%);
    opacity:.08;pointer-events:none;
  }
  .body-emp .insight-card::before{background:radial-gradient(circle,var(--orange) 0%,transparent 70%)}
  .insight-icon{
    width:48px;height:48px;border-radius:var(--r-pill);
    background:var(--lime);color:#fff;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 6px 20px rgba(46,125,77,.35);
  }
  .body-emp .insight-icon{background:var(--orange);box-shadow:0 6px 20px rgba(244,160,76,.35)}
  .insight-icon svg{width:22px;height:22px;stroke-width:2}
  .insight-body{flex:1;min-width:0;position:relative}
  .insight-eyebrow{
    font-family:var(--M);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--lime);margin-bottom:6px;
  }
  .body-emp .insight-eyebrow{color:var(--orange)}
  .insight-h{
    font-family:var(--F);font-size:18px;font-weight:500;letter-spacing:-.2px;
    color:var(--w);line-height:1.35;margin-bottom:4px;
  }
  .insight-h b{color:var(--lime);font-weight:500}
  .body-emp .insight-h b{color:var(--orange)}
  .insight-h .neg{color:#E4856B}
  .insight-d{
    font-family:var(--M);font-size:11px;letter-spacing:.2px;
    color:var(--t-secondary);line-height:1.5;
  }
  .insight-trend{
    display:inline-flex;align-items:center;gap:4px;
    margin-left:8px;padding:2px 8px;
    background:rgba(46,125,77,.15);color:var(--lime);
    border-radius:3px;font-family:var(--M);font-size:10px;font-weight:500;
    letter-spacing:.5px;text-transform:uppercase;
  }
  .insight-trend.down{background:rgba(228,133,107,.15);color:#E4856B}
  .insight-trend svg{width:11px;height:11px;stroke-width:2.5}
  @media(max-width:560px){
    .insight-card{padding:16px 18px;gap:14px}
    .insight-icon{width:40px;height:40px}
    .insight-h{font-size:15px}
    .insight-d{font-size:10.5px}
  }

  /* C.2 · Match breakdown modal · transparência do algoritmo */
  .match-pill{cursor:pointer;transition:transform .12s, box-shadow .12s}
  .match-pill:hover{transform:scale(1.05);box-shadow:0 2px 12px rgba(46,125,77,.3)}
  .zlist .zmatch{cursor:pointer}
  .mb-modal-bg{
    position:fixed;inset:0;z-index:300;
    background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
    display:none;align-items:center;justify-content:center;padding:20px;
    animation:mb-fadein .25s ease-out;
  }
  .mb-modal-bg.show{display:flex}
  @keyframes mb-fadein{from{opacity:0}to{opacity:1}}
  .mb-modal{
    background:var(--s1);border:1px solid var(--b1);
    border-radius:var(--r-lg);padding:32px;
    max-width:480px;width:100%;
    box-shadow:var(--shadow-2);
    animation:mb-popin .35s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes mb-popin{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .mb-head{text-align:center;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--b1)}
  .mb-eyebrow{
    font-family:var(--M);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--t-tertiary);margin-bottom:8px;
  }
  .mb-score{
    font-family:var(--F);font-size:64px;font-weight:500;letter-spacing:-2px;
    line-height:1;color:var(--lime);
  }
  .mb-score.mid{color:#F4C95B}
  .mb-score.low{color:var(--t-tertiary)}
  .mb-score-pct{font-size:24px;color:var(--t-tertiary);margin-left:2px}
  .mb-score-l{
    font-family:var(--M);font-size:11px;color:var(--t-secondary);
    letter-spacing:.5px;margin-top:6px;
  }
  .mb-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
  .mb-item{
    display:grid;grid-template-columns:36px 1fr auto;gap:14px;align-items:center;
    padding:12px 14px;background:var(--s2);border-radius:var(--r-md);
    border:1px solid var(--b1);
  }
  .mb-item-icon{
    width:32px;height:32px;border-radius:var(--r-pill);
    background:var(--ld);color:var(--lime);
    display:flex;align-items:center;justify-content:center;
  }
  .mb-item-icon.partial{background:rgba(255,214,0,.15);color:#F4C95B}
  .mb-item-icon.miss{background:rgba(228,133,107,.15);color:#E4856B}
  .mb-item-icon svg{width:14px;height:14px;stroke-width:2.2}
  .mb-item-info{min-width:0}
  .mb-item-l{
    font-family:var(--F);font-size:13px;font-weight:500;color:var(--w);
    line-height:1.2;margin-bottom:2px;
  }
  .mb-item-d{
    font-family:var(--M);font-size:10.5px;color:var(--t-tertiary);
    letter-spacing:.2px;line-height:1.4;
  }
  .mb-item-pts{
    font-family:var(--F);font-size:14px;font-weight:500;color:var(--lime);
    letter-spacing:-.2px;
  }
  .mb-item-pts.partial{color:#F4C95B}
  .mb-item-pts.miss{color:var(--t-tertiary)}
  .mb-foot{display:flex;justify-content:space-between;align-items:center;gap:14px}
  .mb-close{
    padding:11px 22px;background:var(--lime);color:#fff;border:none;
    border-radius:var(--r-pill);font-family:var(--F);font-size:13px;font-weight:500;
    cursor:pointer;transition:transform .12s;
  }
  .mb-close:hover{transform:translateY(-1px)}

  /* C.3 · Botão duplicar vaga · sutil mas presente */
  .vaga-action-dup{
    background:transparent;border:1px solid var(--b1);
    width:32px;height:32px;border-radius:var(--r-pill);
    display:inline-flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all .15s;color:var(--t-tertiary);
    margin-left:auto;
  }
  .vaga-action-dup:hover{background:var(--s2);color:var(--orange);border-color:var(--orange)}
  .vaga-action-dup svg{width:14px;height:14px;stroke-width:1.8}
  .vaga-actions-row{display:flex;align-items:center;gap:6px;flex-shrink:0}

  /* Sugestão de valor histórico no wizard de vaga */
  .value-suggestion{
    margin-top:8px;padding:12px 14px;
    background:rgba(244,160,76,.08);border:1px solid rgba(244,160,76,.25);
    border-radius:var(--r-md);
    display:flex;align-items:center;gap:12px;
    font-family:var(--M);font-size:11.5px;color:var(--t-secondary);letter-spacing:.2px;
    line-height:1.45;
  }
  .value-suggestion-icon{color:var(--orange);flex-shrink:0;width:16px;height:16px;stroke-width:1.8}
  .value-suggestion b{color:var(--w);font-family:var(--F);font-weight:500}
  .value-suggestion-cta{
    margin-left:auto;padding:6px 12px;background:var(--orange);color:#fff;border:none;
    border-radius:var(--r-pill);font-family:var(--F);font-size:11px;font-weight:500;
    cursor:pointer;flex-shrink:0;transition:transform .1s;
  }
  .value-suggestion-cta:hover{transform:translateY(-1px)}

  /* C.4 · Print mode · @media print esconde tudo exceto o painel */
  @media print {
    body { background:#fff !important; color:#000 !important }
    .sidebar, .bottom-nav, .fab-vaga, .demo-bar, .theme-toggle,
    .action-banner, .feedback-gate, .pwa-install-banner, .match-modal-bg,
    .mb-modal-bg, .pdf-export-btn, .role-tab, .notif-stack { display:none !important }
    .shell { display:block !important }
    .main { padding:0 !important }
    .insight-card, .kpi, .section, .hist-row { break-inside:avoid }
    .kpis { display:grid !important; grid-template-columns:repeat(3,1fr) !important; gap:8px !important }
    .kpi { padding:14px !important; background:#fff !important; border:1px solid #ddd !important; color:#000 !important }
    .kpi-l, .kpi-d { color:#444 !important }
    .kpi-v { color:#000 !important }
    .section { background:#fff !important; border:1px solid #ddd !important; box-shadow:none !important; color:#000 !important }
    .section-h, .section-h h2 { color:#000 !important; border-color:#ddd !important }
    .hist-row { background:#fff !important; color:#000 !important; border-color:#eee !important }
    .hist-data-d, .hist-fn, .hist-valor { color:#000 !important }
    .hist-data-y, .hist-fb, .hist-emp { color:#444 !important }
    .insight-card { background:#fff !important; border:2px solid #2D7A4F !important; color:#000 !important }
    .insight-h, .insight-h b { color:#000 !important }
    .insight-d { color:#444 !important }
    .main-h, .main-d { color:#000 !important }
    .main-d { color:#444 !important }
    /* Cabeçalho impresso · só aparece em print */
    .print-header { display:flex !important; align-items:center; justify-content:space-between;
      padding:12px 0 18px; border-bottom:2px solid #000; margin-bottom:18px }
    .print-header-logo { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:1px; color:#000 }
    .print-header-meta { font-family:'JetBrains Mono',monospace; font-size:11px; color:#444; text-align:right }
    .print-footer { display:block !important; margin-top:36px; padding-top:14px; border-top:1px solid #ccc;
      font-family:'JetBrains Mono',monospace; font-size:10px; color:#666; text-align:center; letter-spacing:.5px }
    @page { margin:18mm 14mm; size:A4 portrait }
  }
  .print-header, .print-footer { display:none }

  /* Botão exportar PDF · ao lado das tabs de período */
  .pdf-export-btn{
    margin-left:auto;
    display:inline-flex;align-items:center;gap:8px;
    padding:9px 16px;background:transparent;
    border:1px solid var(--b1);border-radius:var(--r-pill);
    font-family:var(--F);font-size:12.5px;font-weight:500;color:var(--w);
    cursor:pointer;transition:all .15s;letter-spacing:.1px;
  }
  .pdf-export-btn:hover{background:var(--s2);border-color:var(--lime);color:var(--lime)}
  .body-emp .pdf-export-btn:hover{border-color:var(--orange);color:var(--orange)}
  .pdf-export-btn svg{width:14px;height:14px;stroke-width:1.8}

  /* ════════════════════════════════════════════════════════════════
     ZLIST · listagem zebrada compacta · feed/candidaturas/turnos do trabalhador
     Otimizada para celular simples · alta densidade · sem cards pesados
     ════════════════════════════════════════════════════════════════ */
  .zlist{padding:0;overflow:hidden;border-radius:var(--r-md)}
  .zlist .zrow{
    display:grid;grid-template-columns:44px 1fr auto;gap:12px;align-items:center;
    padding:12px 16px;
    border-bottom:1px solid rgba(255,255,255,.06);
    cursor:pointer;transition:background .12s ease;
    min-height:64px;position:relative;
  }
  .zlist .zrow:last-child{border-bottom:0}
  .zlist .zrow:nth-child(odd){background:transparent}
  .zlist .zrow:nth-child(even){background:rgba(255,255,255,.03)}
  .zlist .zrow:hover,
  .zlist .zrow:active{background:rgba(255,255,255,.07)}
  .zlist .zrow.candidatado{background:rgba(46,125,77,.10)}
  .zlist .zrow.candidatado:nth-child(even){background:rgba(46,125,77,.13)}
  .zlist .zrow.confirmado{background:rgba(255,214,0,.07)}
  .zlist .zrow.confirmado:nth-child(even){background:rgba(255,214,0,.10)}
  .zlist .zrow.ativo{background:rgba(0,168,104,.08)}
  .zlist .zrow.ativo:nth-child(even){background:rgba(0,168,104,.11)}
  .zlist .zrow.finalizado{opacity:.85}

  /* Avatar/badge na esquerda · 36x36 · monogram ou logo */
  .zlist .zav{
    width:36px;height:36px;border-radius:var(--r-pill);
    background:var(--s2);border:1px solid var(--b1);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;
  }
  .zlist .zav img{width:100%;height:100%;object-fit:cover}
  .zlist .zav .zav-text{
    font-family:var(--F);font-size:14px;font-weight:500;color:var(--w);letter-spacing:-.3px;
  }
  .zlist .zav .zav-icon{width:16px;height:16px;stroke-width:1.8;color:var(--t-secondary)}

  /* Bloco central · função+estabelecimento (linha 1) + meta (linha 2) */
  .zlist .zinfo{min-width:0;display:flex;flex-direction:column;gap:3px}
  .zlist .zfn{
    font-family:var(--F);font-size:14px;font-weight:500;letter-spacing:-.1px;
    color:var(--w);line-height:1.2;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .zlist .zemp{color:var(--t-secondary);font-weight:400;font-size:13px}
  .zlist .zmeta{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    font-family:var(--M);font-size:10.5px;color:var(--t-tertiary);letter-spacing:.2px;
    line-height:1.2;
  }
  .zlist .zmeta span{display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
  .zlist .zmeta svg{width:10px;height:10px;stroke-width:2;opacity:.75}
  .zlist .zmeta b{color:var(--w);font-family:var(--F);font-weight:500;font-size:11.5px;letter-spacing:-.1px}

  /* Coluna direita · match%, valor ou status */
  .zlist .zright{
    display:flex;flex-direction:column;align-items:flex-end;gap:4px;
    flex-shrink:0;text-align:right;
  }
  .zlist .zmatch{
    font-family:var(--F);font-size:18px;font-weight:500;letter-spacing:-.5px;color:var(--lime);
    line-height:1;display:inline-flex;align-items:baseline;gap:1px;
  }
  .zlist .zmatch .zmatch-pct{font-size:11px;color:var(--t-tertiary);font-weight:500}
  .zlist .zmatch.mid{color:#F4C95B}
  .zlist .zmatch.low{color:var(--t-tertiary)}
  .zlist .zmatch-l{
    font-family:var(--M);font-size:8.5px;color:var(--t-tertiary);letter-spacing:1.5px;text-transform:uppercase;
  }
  .zlist .zvalor{font-family:var(--F);font-size:15px;font-weight:500;color:var(--w);letter-spacing:-.2px;line-height:1}
  .zlist .zstatus{
    font-family:var(--M);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;
    padding:3px 7px;border-radius:3px;background:var(--s2);color:var(--t-secondary);
    border:1px solid var(--b1);
  }
  .zlist .zstatus.candidatado{background:rgba(46,125,77,.18);color:#7BC299;border-color:rgba(46,125,77,.4)}
  .zlist .zstatus.confirmado{background:rgba(255,214,0,.18);color:#F4C95B;border-color:rgba(255,214,0,.4)}
  .zlist .zstatus.ativo{background:rgba(0,168,104,.18);color:var(--fhp);border-color:rgba(0,168,104,.4)}
  .zlist .zstatus.finalizado{background:var(--s2);color:var(--t-secondary)}

  /* Mobile · ainda mais compacto · meta quebra abaixo se preciso */
  @media(max-width:560px){
    .zlist .zrow{grid-template-columns:36px 1fr auto;gap:10px;padding:11px 13px;min-height:60px}
    .zlist .zav{width:32px;height:32px}
    .zlist .zfn{font-size:13.5px}
    .zlist .zemp{font-size:12.5px}
    .zlist .zmeta{font-size:10px;gap:8px}
    .zlist .zmatch{font-size:16px}
    .zlist .zvalor{font-size:14px}
    .zlist .zmatch-l{display:none}
  }

  /* Light theme · zebra mais sutil */
  [data-theme="light"] .hist-list .hist-row:nth-child(even),
  body:not([data-theme="dark"]) .hist-list .hist-row:nth-child(even){background:rgba(0,0,0,.025)}
  [data-theme="light"] .zlist .zrow:nth-child(even),
  body:not([data-theme="dark"]) .zlist .zrow:nth-child(even){background:rgba(0,0,0,.028)}
  [data-theme="light"] .zlist .zrow:hover,
  [data-theme="light"] .zlist .zrow:active,
  body:not([data-theme="dark"]) .zlist .zrow:hover{background:rgba(0,0,0,.06)}
  [data-theme="light"] .zlist .zrow{border-bottom-color:rgba(0,0,0,.06)}

  /* ════════════════════════════════════════════════════════════════
     SPRINT A · WELCOME + CADASTRO COMPLETO + FEEDBACK GATE
     Funil de aprovação · ritual pós-liberação · gate de reputação
     ════════════════════════════════════════════════════════════════ */

  /* Welcome screen · ritual de boas-vindas pós-aprovação */
  .welcome-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:48px 24px;background:var(--bg);
  }
  .welcome-card{
    max-width:680px;width:100%;text-align:center;
    background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-xl);
    padding:56px 48px;box-shadow:var(--shadow-2);
    animation:welcome-in .6s cubic-bezier(.2,.7,.3,1);
  }
  @keyframes welcome-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .welcome-eyebrow{
    font-family:var(--M);font-size:11px;letter-spacing:3px;text-transform:uppercase;
    color:var(--lime);margin-bottom:18px;
  }
  .body-emp .welcome-eyebrow{color:var(--orange)}
  .welcome-h{
    font-family:var(--F);font-size:48px;font-weight:500;letter-spacing:-1.2px;
    color:var(--w);line-height:1.05;margin-bottom:14px;
  }
  .welcome-d{
    font-size:16px;color:var(--t-secondary);line-height:1.55;
    max-width:480px;margin:0 auto 36px;
  }
  .welcome-cards{
    display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:36px;
  }
  .welcome-step{
    text-align:left;padding:24px;background:var(--s2);
    border:1px solid var(--b1);border-radius:var(--r-lg);
    display:flex;flex-direction:column;gap:10px;
    transition:all .18s ease;
  }
  .welcome-step.done{opacity:.55}
  .welcome-step-num{
    width:32px;height:32px;border-radius:var(--r-pill);
    background:var(--ld);color:var(--lime);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--F);font-size:15px;font-weight:500;
  }
  .body-emp .welcome-step-num{background:rgba(244,160,76,.16);color:var(--orange)}
  .welcome-step.done .welcome-step-num{background:var(--fhpd);color:var(--fhp)}
  .welcome-step-h{
    font-family:var(--F);font-size:17px;font-weight:500;letter-spacing:-.2px;
    color:var(--w);line-height:1.25;
  }
  .welcome-step-d{
    font-family:var(--M);font-size:11.5px;color:var(--t-secondary);
    letter-spacing:.2px;line-height:1.5;
  }
  .welcome-cta{
    display:inline-flex;align-items:center;gap:10px;
    padding:18px 32px;background:var(--lime);color:#fff;
    font-family:var(--F);font-size:16px;font-weight:500;letter-spacing:-.2px;
    border:none;border-radius:var(--r-pill);cursor:pointer;
    transition:transform .15s, box-shadow .15s;
    box-shadow:0 4px 18px rgba(46,125,77,.35);
  }
  .body-emp .welcome-cta{background:var(--orange);box-shadow:0 4px 18px rgba(244,160,76,.35)}
  .welcome-cta:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(46,125,77,.45)}
  .welcome-skip{
    display:inline-block;margin-top:18px;
    font-family:var(--M);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--t-tertiary);text-decoration:underline;cursor:pointer;
  }
  @media(max-width:680px){
    .welcome-card{padding:40px 24px}
    .welcome-h{font-size:34px}
    .welcome-cards{grid-template-columns:1fr;gap:10px}
    .welcome-cta{width:100%;justify-content:center}
  }

  /* Cadastro completo · 6 campos pós-aprovação */
  .cc-wrap{
    max-width:760px;margin:0 auto;padding:36px 0;
  }
  .cc-progress{
    height:6px;background:var(--s2);border-radius:3px;
    margin-bottom:28px;overflow:hidden;
  }
  .cc-progress-fill{
    height:100%;background:linear-gradient(90deg,var(--lime),var(--lime-2));
    transition:width .4s cubic-bezier(.2,.7,.3,1);
  }
  .body-emp .cc-progress-fill{background:linear-gradient(90deg,var(--orange),#D9A441)}
  .cc-section{
    background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-lg);
    padding:24px;margin-bottom:14px;
    transition:border-color .18s, box-shadow .18s;
  }
  .cc-section.filled{border-color:rgba(46,125,77,.4);box-shadow:0 0 0 1px rgba(46,125,77,.15)}
  .body-emp .cc-section.filled{border-color:rgba(244,160,76,.4);box-shadow:0 0 0 1px rgba(244,160,76,.15)}
  .cc-section-h{
    display:flex;align-items:center;gap:14px;margin-bottom:14px;
  }
  .cc-section-icon{
    width:40px;height:40px;border-radius:var(--r-pill);
    background:var(--ld);color:var(--lime);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .body-emp .cc-section-icon{background:rgba(244,160,76,.16);color:var(--orange)}
  .cc-section.filled .cc-section-icon{background:var(--fhpd);color:var(--fhp)}
  .cc-section-icon svg{width:18px;height:18px;stroke-width:1.8}
  .cc-section-title{
    font-family:var(--F);font-size:18px;font-weight:500;letter-spacing:-.2px;
    color:var(--w);line-height:1.2;
  }
  .cc-section-d{
    font-family:var(--M);font-size:11px;color:var(--t-tertiary);
    letter-spacing:.3px;line-height:1.5;margin-top:2px;
  }
  .cc-section-ok{
    margin-left:auto;font-family:var(--M);font-size:10px;
    color:var(--fhp);letter-spacing:1.5px;text-transform:uppercase;
    background:var(--fhpd);padding:4px 10px;border-radius:3px;
    border:1px solid rgba(0,168,104,.3);
    display:none;
  }
  .cc-section.filled .cc-section-ok{display:inline-block}
  .cc-input{
    width:100%;padding:14px 16px;background:var(--s2);
    border:1px solid var(--b1);border-radius:var(--r-md);
    font-family:var(--B);font-size:16px;color:var(--w);
    transition:border-color .15s;
  }
  .cc-input:focus{outline:none;border-color:var(--lime)}
  .body-emp .cc-input:focus{border-color:var(--orange)}
  .cc-row{display:flex;gap:12px;flex-wrap:wrap}
  .cc-row > *{flex:1;min-width:160px}
  .cc-photo-drop{
    position:relative;display:flex;align-items:center;gap:18px;
    padding:18px;background:var(--s2);border:1px dashed var(--b1);
    border-radius:var(--r-md);cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .cc-photo-drop:hover{border-color:var(--lime);background:var(--ld)}
  .body-emp .cc-photo-drop:hover{border-color:var(--orange);background:rgba(244,160,76,.08)}
  .cc-photo-preview{
    width:64px;height:64px;border-radius:var(--r-pill);
    background:var(--s1);display:flex;align-items:center;justify-content:center;
    overflow:hidden;flex-shrink:0;
  }
  .cc-photo-preview img{width:100%;height:100%;object-fit:cover}
  .cc-photo-preview svg{width:24px;height:24px;color:var(--t-tertiary)}
  .cc-slider-row{display:flex;align-items:center;gap:14px}
  .cc-slider{flex:1;height:6px;-webkit-appearance:none;appearance:none;
    background:var(--s2);border-radius:3px;outline:none;cursor:pointer}
  .cc-slider::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:22px;height:22px;
    border-radius:var(--r-pill);background:var(--lime);cursor:pointer;
    box-shadow:0 2px 8px rgba(46,125,77,.35);
  }
  .body-emp .cc-slider::-webkit-slider-thumb{background:var(--orange);box-shadow:0 2px 8px rgba(244,160,76,.35)}
  .cc-slider-val{
    min-width:80px;text-align:right;font-family:var(--F);font-size:18px;
    font-weight:500;color:var(--w);letter-spacing:-.3px;
  }
  .cc-funcao-pills{display:flex;gap:8px;flex-wrap:wrap}
  .cc-pill{
    padding:8px 14px;background:var(--s2);border:1px solid var(--b1);
    border-radius:var(--r-pill);font-family:var(--B);font-size:13px;
    font-weight:500;color:var(--t-secondary);cursor:pointer;
    transition:all .15s;
  }
  .cc-pill:hover{border-color:var(--lime);color:var(--lime)}
  .cc-pill.active{background:var(--ld);color:var(--lime);border-color:var(--lime)}
  .body-emp .cc-pill:hover{border-color:var(--orange);color:var(--orange)}
  .body-emp .cc-pill.active{background:rgba(244,160,76,.16);color:var(--orange);border-color:var(--orange)}
  .cc-footer{
    display:flex;justify-content:space-between;align-items:center;gap:14px;
    margin-top:24px;padding:18px;background:var(--s1);border-radius:var(--r-lg);
    border:1px solid var(--b1);
  }
  .cc-footer-info{
    font-family:var(--M);font-size:11.5px;color:var(--t-secondary);
    letter-spacing:.2px;line-height:1.45;
  }
  .cc-submit{
    padding:14px 28px;background:var(--lime);color:#fff;border:none;
    border-radius:var(--r-pill);font-family:var(--F);font-size:14px;font-weight:500;
    letter-spacing:.2px;cursor:pointer;white-space:nowrap;
    transition:transform .12s, box-shadow .12s, opacity .15s;
  }
  .cc-submit:disabled{opacity:.5;cursor:not-allowed}
  .cc-submit:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(46,125,77,.4)}
  .body-emp .cc-submit{background:var(--orange)}
  .body-emp .cc-submit:not(:disabled):hover{box-shadow:0 4px 14px rgba(244,160,76,.4)}

  /* Banner feedback gate · gate de reputação */
  .feedback-gate{
    position:sticky;top:0;z-index:50;
    background:linear-gradient(135deg,var(--yellow) 0%,#F4C95B 100%);
    color:#2A1D08;padding:14px 22px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    box-shadow:0 4px 14px rgba(255,214,0,.3);
    animation:gate-pulse 3s ease-in-out infinite;
  }
  @keyframes gate-pulse{0%,100%{box-shadow:0 4px 14px rgba(255,214,0,.3)}50%{box-shadow:0 4px 22px rgba(255,214,0,.55)}}
  .feedback-gate-icon{
    width:38px;height:38px;border-radius:var(--r-pill);
    background:rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .feedback-gate-icon svg{width:18px;height:18px;color:#2A1D08;stroke-width:2}
  .feedback-gate-info{flex:1;min-width:200px}
  .feedback-gate-h{
    font-family:var(--F);font-size:14px;font-weight:500;letter-spacing:-.1px;
    line-height:1.2;margin-bottom:2px;
  }
  .feedback-gate-d{
    font-family:var(--M);font-size:11px;letter-spacing:.2px;line-height:1.45;opacity:.85;
  }
  .feedback-gate-btn{
    padding:10px 18px;background:#2A1D08;color:var(--yellow);border:none;
    border-radius:var(--r-pill);font-family:var(--F);font-size:13px;font-weight:500;
    letter-spacing:.2px;cursor:pointer;white-space:nowrap;
    transition:transform .12s;
  }
  .feedback-gate-btn:hover{transform:translateY(-1px)}
  @media(max-width:560px){
    .feedback-gate{padding:12px 14px;gap:10px}
    .feedback-gate-icon{width:32px;height:32px}
    .feedback-gate-h{font-size:13px}
    .feedback-gate-d{font-size:10.5px}
    .feedback-gate-btn{font-size:12px;padding:8px 14px}
  }

  /* ════════════════════════════════════════════════════════════════
     MATCH CARD MODAL · troca de credenciais visual entre contratante e trabalhador
     Premium overlay · 2 cards face-to-face + handshake center + logo TURNI rodapé
     ════════════════════════════════════════════════════════════════ */
  .match-modal-bg{
    position:fixed;inset:0;z-index:600;
    background:rgba(0,0,0,.78);backdrop-filter:blur(14px);
    display:none;align-items:center;justify-content:center;padding:20px;
    animation:match-fadein .35s ease-out;
    overflow-y:auto;
  }
  .match-modal-bg.show{display:flex}

  /* Modo FOCUS · esconde tudo do app · só os cards e timeline */
  body.match-focused .sidebar,
  body.match-focused .bottom-nav,
  body.match-focused .fab-vaga,
  body.match-focused .action-banner,
  body.match-focused .demo-bar{
    display:none !important;
  }
  body.match-focused .main{
    padding:0 !important;max-height:100vh !important;
  }
  body.match-focused{overflow:hidden}

  /* Botão "Voltar para a home" · saída única do match focus */
  .match-back-home{
    position:fixed;top:20px;left:20px;z-index:700;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    color:rgba(255,255,255,.75);
    padding:10px 18px;border-radius:999px;
    font-family:var(--M);font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;
    cursor:pointer;text-decoration:none;
    display:inline-flex;align-items:center;gap:8px;
    backdrop-filter:blur(8px);
    transition:all .2s;
  }
  .match-back-home:hover{
    background:rgba(255,255,255,.14);color:#fff;border-color:rgba(255,255,255,.25);
    transform:translateX(-2px);
  }
  .match-back-home svg{width:14px;height:14px;stroke-width:2.2}
  @keyframes match-fadein{from{opacity:0}to{opacity:1}}

  .match-modal{
    background:#0F1411;
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;padding:36px 32px 28px;
    max-width:760px;width:100%;
    color:#fff;position:relative;
    box-shadow:0 40px 100px rgba(0,0,0,.6);
    animation:match-zoom .45s cubic-bezier(.16,1,.3,1);
  }
  @keyframes match-zoom{
    from{opacity:0;transform:scale(.92) translateY(20px)}
    to{opacity:1;transform:scale(1) translateY(0)}
  }
  .match-modal.theme-light{
    background:#FFFFFF;color:#0F1B2D;border-color:#E0DDD3;
  }

  .match-close{
    position:absolute;top:14px;right:14px;
    width:36px;height:36px;border-radius:50%;
    background:rgba(255,255,255,.08);color:#fff;border:0;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s,transform .15s;z-index:2;
  }
  .match-close:hover{background:rgba(255,255,255,.16);transform:rotate(90deg)}
  .match-close svg{width:16px;height:16px;stroke-width:2}
  .match-modal.theme-light .match-close{background:rgba(15,27,45,.06);color:#0F1B2D}
  .match-modal.theme-light .match-close:hover{background:rgba(15,27,45,.12)}

  /* HEADER do modal · evento + tagline */
  .match-event{
    text-align:center;margin-bottom:28px;
  }
  .match-event-tag{
    font-family:var(--M);font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;
    color:#7BC299;margin-bottom:12px;
    display:inline-flex;align-items:center;gap:8px;
    padding:5px 14px;border-radius:999px;
    background:rgba(123,194,153,.12);border:1px solid rgba(123,194,153,.30);
  }
  .match-event-tag svg{width:12px;height:12px;stroke-width:2.2}
  .match-event-h{
    font-family:var(--F);font-size:30px;font-weight:500;letter-spacing:-.5px;line-height:1.18;
    margin-bottom:6px;
  }
  .match-event-d{
    font-family:var(--B);font-size:14px;color:rgba(255,255,255,.7);line-height:1.5;
    max-width:520px;margin:0 auto;
  }
  .match-modal.theme-light .match-event-d{color:#5A5A5A}

  /* 2 cards face-to-face · contratante + handshake + trabalhador */
  .match-handshake{
    display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:stretch;
    margin-bottom:28px;
  }
  .match-card{
    background:linear-gradient(160deg,rgba(255,255,255,.05) 0%,rgba(255,255,255,.02) 100%);
    border:1px solid rgba(255,255,255,.10);
    border-radius:18px;padding:22px 18px;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    position:relative;
  }
  .match-modal.theme-light .match-card{
    background:linear-gradient(160deg,#FAF8F2 0%,#F2EFE5 100%);
    border-color:#E0DDD3;
  }
  .match-card-tag{
    font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;
    color:rgba(255,255,255,.6);
  }
  .match-modal.theme-light .match-card-tag{color:#5A5A5A}
  .match-card.emp .match-card-tag{color:#F4C95B}
  .match-card.pro .match-card-tag{color:#7BC299}

  .match-card-avatar{
    width:72px;height:72px;border-radius:50%;
    background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--F);font-size:26px;font-weight:500;color:#fff;
    overflow:hidden;
  }
  .match-card-avatar img{width:100%;height:100%;object-fit:cover}
  .match-card-avatar.logo-mode{background:#fff;border-color:rgba(255,255,255,.10);padding:6px}
  .match-card-avatar.logo-mode img{object-fit:contain;filter:none}

  .match-card-name{
    font-family:var(--F);font-size:17px;font-weight:500;letter-spacing:-.2px;line-height:1.15;
    text-align:center;color:#fff;
  }
  .match-modal.theme-light .match-card-name{color:#0F1B2D}
  .match-card-meta{
    font-family:var(--M);font-size:10px;letter-spacing:.4px;
    color:rgba(255,255,255,.55);text-align:center;line-height:1.4;
  }
  .match-modal.theme-light .match-card-meta{color:#7A7A7A}
  .match-card-extra{
    display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
    margin-top:4px;
    font-family:var(--M);font-size:10px;color:rgba(255,255,255,.7);
  }
  .match-card-extra span{
    padding:3px 9px;border-radius:999px;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);
    display:inline-flex;align-items:center;gap:4px;
  }
  .match-card-extra svg{width:10px;height:10px;stroke-width:2.2}
  .match-modal.theme-light .match-card-extra span{
    background:#fff;border-color:#E0DDD3;color:#5A5A5A;
  }

  /* Centro · handshake icon + linha conectora */
  .match-link{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:0 4px;position:relative;min-width:72px;
  }
  .match-link::before,.match-link::after{
    content:'';position:absolute;left:50%;width:1px;height:calc(50% - 30px);
    background:linear-gradient(180deg,transparent 0%,rgba(123,194,153,.5) 100%);
  }
  .match-link::before{top:0}
  .match-link::after{bottom:0;background:linear-gradient(0deg,transparent 0%,rgba(123,194,153,.5) 100%)}
  .match-link-icon{
    width:54px;height:54px;border-radius:50%;
    background:linear-gradient(135deg,#00A868 0%,#1FB873 100%);
    display:flex;align-items:center;justify-content:center;
    color:#fff;
    box-shadow:0 0 0 4px rgba(0,168,104,.15),0 8px 24px rgba(0,168,104,.40);
    animation:match-pulse 2.4s ease-in-out infinite;
  }
  @keyframes match-pulse{
    0%,100%{box-shadow:0 0 0 4px rgba(0,168,104,.15),0 8px 24px rgba(0,168,104,.40)}
    50%{box-shadow:0 0 0 12px rgba(0,168,104,.05),0 8px 30px rgba(0,168,104,.55)}
  }
  .match-link-icon svg{width:24px;height:24px;stroke-width:2.2}

  /* CTA grande na base */
  .match-cta{
    display:block;width:100%;padding:18px 24px;
    background:linear-gradient(135deg,#00A868 0%,#1FB873 100%);
    color:#fff;border:0;border-radius:14px;cursor:pointer;
    font-family:var(--B);font-size:15px;font-weight:600;letter-spacing:-.1px;
    text-decoration:none;text-align:center;
    transition:transform .15s,box-shadow .15s;
    box-shadow:0 8px 24px rgba(0,168,104,.35);
    display:inline-flex;align-items:center;justify-content:center;gap:10px;
  }
  .match-cta:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,168,104,.50)}
  .match-cta svg{width:16px;height:16px;stroke-width:2.2}

  /* TIMELINE · 7 marcos do fluxo · contexto visual de onde estamos na jornada */
  .match-timeline{
    margin-top:24px;padding:18px 4px 8px;
    border-top:1px solid rgba(255,255,255,.08);
    position:relative;
  }
  .match-modal.theme-light .match-timeline{border-top-color:#E8E5DB}
  .match-timeline-tag{
    font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;
    color:rgba(255,255,255,.4);text-align:center;margin-bottom:14px;
  }
  .match-modal.theme-light .match-timeline-tag{color:#8B8870}
  .match-tl-track{
    display:grid;grid-template-columns:repeat(7,1fr);gap:0;
    position:relative;padding:0 6px;
  }
  /* Linha conectora horizontal · passa por trás dos marcos */
  .match-tl-track::before{
    content:'';position:absolute;left:8%;right:8%;top:11px;height:1px;
    background:rgba(255,255,255,.10);z-index:0;
  }
  .match-modal.theme-light .match-tl-track::before{background:#E0DDD3}
  .match-tl-step{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    position:relative;z-index:1;
  }
  .match-tl-dot{
    width:22px;height:22px;border-radius:50%;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.14);
    display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.4);
    transition:all .25s;
  }
  .match-tl-dot svg{width:10px;height:10px;stroke-width:2.2}
  .match-modal.theme-light .match-tl-dot{
    background:#fff;border-color:#E0DDD3;color:#A8A59B;
  }
  .match-tl-label{
    font-family:var(--M);font-size:8.5px;font-weight:500;letter-spacing:.3px;text-transform:uppercase;
    color:rgba(255,255,255,.4);text-align:center;line-height:1.2;
    max-width:64px;
  }
  .match-modal.theme-light .match-tl-label{color:#8B8870}

  /* Estado: passado · check verde discreto */
  .match-tl-step.done .match-tl-dot{
    background:rgba(0,168,104,.20);border-color:rgba(0,168,104,.45);color:#7BC299;
  }
  .match-modal.theme-light .match-tl-step.done .match-tl-dot{
    background:rgba(0,168,104,.15);border-color:rgba(0,168,104,.45);color:#00A868;
  }
  .match-tl-step.done .match-tl-label{color:rgba(255,255,255,.55)}
  .match-modal.theme-light .match-tl-step.done .match-tl-label{color:#5A7560}

  /* Estado: ATUAL · verde pulsante · destaque máximo */
  .match-tl-step.current .match-tl-dot{
    background:linear-gradient(135deg,#00A868 0%,#1FB873 100%);
    border-color:#00A868;color:#fff;
    width:28px;height:28px;
    box-shadow:0 0 0 4px rgba(0,168,104,.18),0 4px 14px rgba(0,168,104,.40);
    animation:tl-pulse 2.2s ease-in-out infinite;
  }
  .match-tl-step.current .match-tl-dot svg{width:12px;height:12px;stroke-width:2.5}
  @keyframes tl-pulse{
    0%,100%{box-shadow:0 0 0 4px rgba(0,168,104,.18),0 4px 14px rgba(0,168,104,.40)}
    50%{box-shadow:0 0 0 10px rgba(0,168,104,.06),0 4px 18px rgba(0,168,104,.55)}
  }
  .match-tl-step.current .match-tl-label{
    color:#fff;font-weight:600;
  }
  .match-modal.theme-light .match-tl-step.current .match-tl-label{color:#0F1B2D}

  /* Linha conectora preenchida até o marco atual */
  .match-tl-track .match-tl-fill{
    position:absolute;left:8%;top:11px;height:1px;z-index:0;
    background:linear-gradient(90deg,#00A868 0%,#7BC299 100%);
    transition:width .6s cubic-bezier(.16,1,.3,1);
  }

  @media(max-width:640px){
    .match-tl-track{padding:0}
    .match-tl-track::before,.match-tl-track .match-tl-fill{left:6%;right:6%}
    .match-tl-label{font-size:7.5px;letter-spacing:.2px;max-width:48px}
    .match-tl-step.current .match-tl-dot{width:24px;height:24px}
  }

  /* RODAPÉ · logo TURNI centralizado */
  .match-foot{
    text-align:center;margin-top:24px;padding-top:20px;
    border-top:1px solid rgba(255,255,255,.08);
  }
  .match-modal.theme-light .match-foot{border-top-color:#E8E5DB}
  .match-foot-tag{
    font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:3px;text-transform:uppercase;
    color:rgba(255,255,255,.4);margin-bottom:6px;
  }
  .match-modal.theme-light .match-foot-tag{color:#8B8870}
  .match-foot-logo{
    font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;color:#fff;line-height:1;
    display:inline-block;font-weight:400;
  }
  .match-modal.theme-light .match-foot-logo{color:#0F1B2D}
  .match-foot-logo .di{color:var(--logo-green)}
  .match-foot-logo .de{-webkit-text-stroke:1.5px var(--logo-green);color:transparent}

  @media(max-width:640px){
    .match-modal{padding:28px 20px 20px}
    .match-handshake{grid-template-columns:1fr;gap:10px}
    .match-link{padding:6px 0;flex-direction:row;gap:14px;min-width:0}
    .match-link::before,.match-link::after{display:none}
    .match-event-h{font-size:24px}
    .match-event-d{font-size:13px}
    .match-card{padding:16px 14px}
    .match-card-avatar{width:60px;height:60px;font-size:22px}
    .match-card-name{font-size:15px}
    .match-cta{padding:16px 20px;font-size:14px}
  }

  /* ════════════════════════════════════════════════════════════════
     P1.2 · Wizard 3-steps "Nova vaga" · progress bar + panes + resumo
     ════════════════════════════════════════════════════════════════ */
  .wiz-progress{
    display:flex;align-items:center;gap:8px;margin-bottom:24px;
    padding:14px 18px;background:var(--s1);border:1px solid var(--b1);
    border-radius:14px;flex-wrap:wrap;
  }
  .wiz-step{
    display:flex;align-items:center;gap:10px;flex:1;min-width:0;
    padding:8px 10px;border-radius:10px;transition:all .25s;
  }
  .wiz-step:not(:last-child)::after{
    content:'';flex:0 0 auto;width:18px;height:1px;background:var(--b2);margin-left:6px;
  }
  .wiz-step-num{
    width:28px;height:28px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--F);font-size:13px;font-weight:500;
    background:var(--s2);color:var(--t-tertiary);
    border:1px solid var(--b1);
    transition:all .25s;
  }
  .wiz-step-label{
    font-family:var(--M);font-size:11px;font-weight:500;letter-spacing:.3px;
    color:var(--t-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .wiz-step.active .wiz-step-num{background:var(--orange);color:#fff;border-color:var(--orange)}
  .wiz-step.active .wiz-step-label{color:var(--w);font-weight:600}
  .wiz-step.done .wiz-step-num{background:var(--fhp);color:#fff;border-color:var(--fhp)}
  .wiz-step.done .wiz-step-num::before{content:'✓';font-size:14px}
  .wiz-step.done .wiz-step-num{font-size:0}

  .wiz-card{padding:32px}
  .wiz-pane{display:none}
  .wiz-pane.active{display:block;animation:wiz-fadein .25s ease-out}
  @keyframes wiz-fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .wiz-pane-h{
    font-family:var(--F);font-size:22px;font-weight:500;letter-spacing:-.3px;line-height:1.2;
    margin-bottom:6px;
  }
  .wiz-pane-d{
    font-family:var(--B);font-size:14px;color:var(--t-secondary);line-height:1.55;margin-bottom:20px;
  }

  .wiz-summary{
    margin-top:24px;padding:20px;
    background:var(--s2);border:1px solid var(--b1);border-radius:12px;
  }
  .wiz-summary-h{
    font-family:var(--M);font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;
    color:var(--t-tertiary);margin-bottom:14px;
  }
  .wiz-summary-row{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:8px 0;border-bottom:1px solid var(--b1);
    font-family:var(--B);font-size:14px;
  }
  .wiz-summary-row:last-child{border-bottom:0}
  .wiz-summary-row span{color:var(--t-tertiary)}
  .wiz-summary-row b{color:var(--w);font-weight:500}

  .wiz-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px}
  .wiz-actions a:first-child{margin-right:auto}

  @media(max-width:560px){
    .wiz-progress{padding:10px 12px}
    .wiz-step-label{font-size:10px}
    .wiz-card{padding:22px 18px}
    .wiz-pane-h{font-size:18px}
    .wiz-actions{flex-direction:column-reverse}
    .wiz-actions a:first-child{margin-right:0}
    .wiz-actions button,.wiz-actions a{width:100%;justify-content:center}
  }

  /* ════════════════════════════════════════════════════════════════
     P1.4 · Onboarding 3 telas · primeiro acesso pós-aprovação
     Modal overlay com 3 slides + dots de progresso + botão skip sempre visível
     ════════════════════════════════════════════════════════════════ */
  .onb-overlay{
    position:fixed;inset:0;z-index:500;
    background:rgba(15,27,45,.55);backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;padding:24px;
    animation:onb-fadein .3s ease-out;
  }
  @keyframes onb-fadein{from{opacity:0}to{opacity:1}}
  .onb-modal{
    background:linear-gradient(160deg,#1F2E25 0%,#181B17 100%);
    border:1px solid rgba(255,255,255,.10);
    border-radius:24px;padding:36px 32px 28px;
    max-width:480px;width:100%;
    color:#fff;position:relative;
    box-shadow:0 30px 80px rgba(0,0,0,.5);
  }
  .body-emp .onb-modal{background:linear-gradient(160deg,#3A2A12 0%,#1F1608 100%)}
  .onb-skip{
    position:absolute;top:18px;right:18px;
    font-family:var(--M);font-size:11px;letter-spacing:.5px;text-transform:uppercase;
    color:rgba(255,255,255,.6);background:transparent;border:0;cursor:pointer;
    padding:8px 12px;border-radius:6px;
  }
  .onb-skip:hover{color:#fff;background:rgba(255,255,255,.06)}
  .onb-icon{
    width:64px;height:64px;border-radius:16px;
    background:rgba(123,194,153,.12);
    display:flex;align-items:center;justify-content:center;
    color:#7BC299;margin-bottom:18px;
    border:1px solid rgba(123,194,153,.25);
  }
  .body-emp .onb-icon{background:rgba(244,201,91,.12);color:#F4C95B;border-color:rgba(244,201,91,.25)}
  .onb-icon svg{width:30px;height:30px;stroke-width:1.8}
  .onb-title{
    font-family:var(--F);font-size:24px;font-weight:500;letter-spacing:-.4px;line-height:1.18;
    color:#fff;margin-bottom:10px;
  }
  .onb-desc{
    font-family:var(--B);font-size:14px;line-height:1.55;color:rgba(255,255,255,.78);
    margin-bottom:24px;
  }
  .onb-dots{
    display:flex;justify-content:center;gap:6px;margin-bottom:20px;
  }
  .onb-dot{
    width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.20);
    transition:all .25s;
  }
  .onb-dot.active{background:#7BC299;width:24px;border-radius:3px}
  .body-emp .onb-dot.active{background:#F4C95B}
  .onb-actions{display:flex;gap:10px}
  .onb-btn{
    flex:1;padding:14px 18px;border-radius:12px;
    font-family:var(--B);font-size:14px;font-weight:500;cursor:pointer;
    border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:#fff;
    transition:all .15s;
  }
  .onb-btn:hover{background:rgba(255,255,255,.08)}
  .onb-btn.primary{background:#7BC299;color:#0F2918;border-color:#7BC299}
  .onb-btn.primary:hover{background:#9DD4B0;border-color:#9DD4B0}
  .body-emp .onb-btn.primary{background:#F4C95B;color:#1F1608;border-color:#F4C95B}
  .body-emp .onb-btn.primary:hover{background:#FFD66B;border-color:#FFD66B}

  /* ════════════════════════════════════════════════════════════════
     P1.3 · Card empresa em ACCORDION no mobile · reduz cognitive load
     Cada .emp-block vira clicável · header sempre visível, conteúdo expand/collapse
     ════════════════════════════════════════════════════════════════ */
  @media(max-width:768px){
    .emp-grid{grid-template-columns:1fr !important;gap:12px !important}
    .emp-block{cursor:pointer;transition:padding .2s}
    .emp-block .emp-block-h{
      display:flex;align-items:center;justify-content:space-between;
      cursor:pointer;user-select:none;
    }
    .emp-block .emp-block-h::after{
      content:'';width:10px;height:10px;
      border-right:2px solid currentColor;
      border-bottom:2px solid currentColor;
      transform:rotate(45deg);transition:transform .25s;
      opacity:.6;margin-left:auto;
    }
    .emp-block.collapsed .emp-block-h::after{transform:rotate(-45deg)}
    .emp-block.collapsed > *:not(.emp-block-h){display:none}
